<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage Films — Orçamento de Produção</title>
<style>
  :root{
    --bg:#0d0d0d; --panel:#141414; --panel2:#1a1a1a; --line:#262626;
    --gold:#c9a227; --gold-soft:#e0bf4d; --txt:#e8e0d0; --txt-dim:#8a8276;
    --blue-in:#9fc0ff; --input-bg:#11151f;
    --green:#5ec27a; --green-bg:#0f1f12;
    --yellow:#e0b53d; --yellow-bg:#211c0a;
    --red:#e06a5e; --red-bg:#1f0f0d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Mono','SF Mono',Menlo,monospace;font-size:13px;line-height:1.5}
  .app{max-width:1180px;margin:0 auto;padding:0 0 80px}
  /* Header */
  .top{background:#0d0d0d;border-bottom:1px solid var(--line);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:50}
  .brand{font-family:'DM Sans',system-ui,sans-serif}
  .brand .eyebrow{font-size:10px;letter-spacing:.25em;color:var(--txt-dim);text-transform:uppercase}
  .brand h1{font-size:19px;font-weight:700;color:var(--txt);letter-spacing:-.01em;margin-top:2px}
  .proj-name{background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--txt);font:inherit;font-family:'DM Sans',sans-serif;font-size:19px;font-weight:700;padding:2px 0;width:340px;max-width:50vw}
  .proj-name:focus{outline:none;border-color:var(--gold)}
  /* Tabs */
  .tabs{display:flex;gap:4px;background:#0d0d0d;border-bottom:1px solid var(--line);padding:0 24px;overflow-x:auto;position:sticky;top:73px;z-index:49}
  .tab{padding:12px 18px;background:none;border:none;border-bottom:2px solid transparent;color:var(--txt-dim);font:inherit;font-size:12px;cursor:pointer;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em;transition:.15s}
  .tab:hover{color:var(--txt)}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
  .tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:7px;vertical-align:middle}
  /* Views */
  .view{display:none;padding:24px}
  .view.active{display:block}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px}
  .panel-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt-dim);margin-bottom:14px}
  /* Sections (categorias) */
  .cat{border:1px solid var(--line);border-radius:8px;margin-bottom:8px;overflow:hidden}
  .cat-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;background:var(--panel);user-select:none}
  .cat-head:hover{background:var(--panel2)}
  .cat-head .label{display:flex;align-items:center;gap:10px;font-size:12px;text-transform:uppercase;letter-spacing:.05em}
  .cat-head .icon{font-size:14px}
  .cat-total{color:var(--gold);font-weight:500}
  .cat-total.zero{color:#444}
  .cat-body{display:none;padding:0 16px 14px;background:#0a0a0a}
  .cat.open .cat-body{display:block}
  .cat.open .cat-head{background:var(--panel2)}
  .chev{color:#555;font-size:10px;transition:transform .2s}
  .cat.open .chev{transform:rotate(180deg)}
  /* Item table */
  table{width:100%;border-collapse:collapse}
  .ihead th{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.08em;text-align:left;padding:8px 6px 6px;border-bottom:1px solid var(--line);font-weight:400}
  .irow td{padding:5px 6px;border-bottom:1px solid #141414;vertical-align:middle}
  .irow input{background:var(--input-bg);border:1px solid #222;border-radius:4px;color:var(--blue-in);font:inherit;font-size:12px;padding:5px 7px;width:100%}
  .irow input:focus{outline:none;border-color:var(--gold)}
  .irow input.txt{color:var(--txt);text-align:left}
  .irow input.num{text-align:center}
  /* remove setinhas do type=number que atrapalham campos estreitos */
  .irow input[type=number]::-webkit-inner-spin-button,
  .irow input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  .irow input[type=number]{-moz-appearance:textfield}
  .aj-table input[type=number]::-webkit-inner-spin-button,
  .aj-table input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  .aj-table input[type=number]{-moz-appearance:textfield}
  .irow input.money{text-align:right}
  .irow .total{color:var(--gold);font-weight:500;text-align:right;font-size:12px;white-space:nowrap}
  .irow .del{background:none;border:none;color:#444;cursor:pointer;font-size:13px;padding:2px}
  .irow .del:hover{color:var(--red)}
  .add-item{margin-top:10px;padding:6px 12px;background:none;border:1px dashed #2a2a2a;border-radius:4px;color:#555;font:inherit;font-size:10px;cursor:pointer;text-transform:uppercase;letter-spacing:.08em}
  .add-item:hover{border-color:var(--gold);color:var(--gold)}
  /* Config fiscal */
  .cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .cfg-field label{display:block;font-size:10px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
  .cfg-field .hint{color:#555;text-transform:none;letter-spacing:0}
  .cfg-field input{width:100%;background:var(--input-bg);border:1px solid #222;border-bottom:2px solid var(--gold);border-radius:4px;color:var(--blue-in);font:inherit;font-size:16px;font-weight:700;padding:8px 10px;text-align:right}
  .cfg-field input:focus{outline:none;border-color:var(--gold-soft)}
  /* Result rows */
  .res-row{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid #181818}
  .res-row .rlabel{font-size:11px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.04em}
  .res-row .rlabel.sub{padding-left:14px;text-transform:none;color:#666}
  .res-row .rval{font-size:13px;color:var(--txt);font-weight:500}
  .res-big{padding:14px;border:1px solid var(--line);border-radius:8px;margin-top:12px;background:#0a0a0a}
  .res-big .rb-label{font-size:10px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
  .res-big .rb-val{font-size:26px;font-weight:700;font-family:'DM Sans',sans-serif;color:var(--gold)}
  .res-big.lucro .rb-val{font-size:22px}
  /* KPI grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .kpi{background:#0a0a0a;border:1px solid var(--line);border-radius:8px;padding:14px}
  .kpi .k-label{font-size:9px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
  .kpi .k-val{font-size:17px;font-weight:700;font-family:'DM Sans',sans-serif}
  /* Status banner */
  .status{border-radius:10px;padding:24px;text-align:center;margin-bottom:16px;border:1px solid}
  .status .s-emoji{font-size:32px;display:block;margin-bottom:8px}
  .status .s-text{font-size:18px;font-weight:700;font-family:'DM Sans',sans-serif;letter-spacing:-.01em}
  .status .s-sub{font-size:12px;margin-top:6px;opacity:.85}
  .status.green{background:var(--green-bg);border-color:#2a5c34;color:var(--green)}
  .status.yellow{background:var(--yellow-bg);border-color:#5c5021;color:var(--yellow)}
  .status.red{background:var(--red-bg);border-color:#5c2620;color:var(--red)}
  /* Generic colored values */
  .v-green{color:var(--green)} .v-yellow{color:var(--yellow)} .v-red{color:var(--red)}
  /* Folha de rosto */
  .fr{background:#fff;color:#222;border-radius:10px;overflow:hidden;font-family:'DM Sans',Arial,sans-serif}
  .fr-head{background:#0d0d0d;color:#fff;padding:28px;text-align:center}
  .fr-head .fr-brand{font-size:30px;font-weight:700;color:var(--gold);letter-spacing:.02em}
  .fr-head .fr-sub{font-size:11px;color:#999;letter-spacing:.1em;margin-top:6px;text-transform:uppercase}
  .fr-info{background:#1a1a1a;padding:14px 28px}
  .fr-info .fr-irow{display:flex;justify-content:flex-end;gap:10px;padding:3px 0}
  .fr-info .fr-ilabel{color:#888;font-size:11px;font-weight:600}
  .fr-info .fr-ival{color:var(--gold);font-size:12px;font-weight:600;min-width:240px}
  .fr-body{padding:24px 28px}
  .fr-table{width:100%;border-collapse:collapse}
  .fr-table th{background:#1f4e79;color:#fff;font-size:11px;padding:10px 12px;text-align:left;letter-spacing:.04em}
  .fr-table th.r{text-align:right}.fr-table th.c{text-align:center}
  .fr-table td{padding:9px 12px;border-bottom:1px solid #eee;font-size:13px;color:#333}
  .fr-table td.r{text-align:right;color:#1f4e79;font-variant-numeric:tabular-nums}
  .fr-table td.c{text-align:center;font-weight:700;color:#1f4e79}
  .fr-table tr:nth-child(even) td{background:#f8f8f8}
  .fr-table tr.sub td{background:#e8e8e8;font-weight:700;color:#1a1a1a;border-top:2px solid #999;border-bottom:2px solid #999;font-size:14px}
  .fr-table tr.fiscal td{background:#fff}
  .fr-table tr.total td{background:#0d0d0d;color:#fff;font-weight:700;font-size:17px;border:none}
  .fr-table tr.total td.r{color:var(--gold)}
  .fr-obs{padding:18px 28px 28px}
  .fr-obs h4{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
  .fr-obs li{font-size:10px;color:#666;margin-bottom:4px;list-style:none;padding-left:12px;position:relative}
  .fr-obs li::before{content:'·';position:absolute;left:2px}
  /* Analysis table */
  .an-table{width:100%;border-collapse:collapse;font-size:12px}
  .an-table th{background:var(--panel2);color:var(--gold);font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:9px 8px;text-align:right;font-weight:500;border-bottom:1px solid var(--line)}
  .an-table th:first-child{text-align:left}
  .an-table td{padding:8px;border-bottom:1px solid #141414;text-align:right;font-variant-numeric:tabular-nums}
  .an-table td:first-child{text-align:left;color:var(--txt)}
  .an-table tr.total-row td{border-top:1px solid var(--line);font-weight:700;color:var(--txt);background:#0a0a0a}
  /* Ajuste escopo */
  .aj-table{width:100%;border-collapse:collapse;font-size:12px}
  .aj-table th{background:var(--panel2);color:var(--gold);font-size:9px;text-transform:uppercase;padding:8px 6px;text-align:left;font-weight:500;letter-spacing:.05em}
  .aj-table td{padding:4px 6px;border-bottom:1px solid #141414}
  .aj-table input{background:var(--input-bg);border:1px solid #222;border-radius:4px;color:var(--blue-in);font:inherit;font-size:11px;padding:4px 6px;width:100%}
  .aj-table input:focus{outline:none;border-color:var(--gold)}
  .aj-table input.txt{color:var(--txt)}
  .aj-table .econ{color:var(--green);font-weight:500;text-align:right;white-space:nowrap}
  .callout{border-left:2px solid var(--gold);background:#15120a;border-radius:0 8px 8px 0;padding:12px 14px;font-size:11px;color:#cbb878;line-height:1.6;margin:12px 0}
  .callout b{color:var(--gold)}
  .client-text{background:#0a0a0a;border:1px solid var(--line);border-radius:8px;padding:16px;font-size:12px;color:#bbb;line-height:1.7;white-space:pre-wrap;margin-top:12px}
  /* Buttons */
  .btn{padding:9px 18px;background:var(--gold);color:#0d0d0d;border:none;border-radius:6px;font:inherit;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.06em}
  .btn:hover{background:var(--gold-soft)}
  .btn-ghost{background:none;border:1px solid var(--line);color:var(--txt-dim)}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
  .btn-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  /* INÍCIO */
  .hero{text-align:center;padding:32px 20px;border-bottom:1px solid var(--line);margin-bottom:24px}
  .hero h2{font-family:'DM Sans',sans-serif;font-size:26px;font-weight:700;color:var(--gold);margin-bottom:8px}
  .hero p{color:var(--txt-dim);font-size:13px}
  .rule{border-left:2px solid var(--gold);background:#15120a;border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:20px;color:var(--gold-soft);font-size:13px;line-height:1.6}
  .steps{counter-reset:step}
  .step{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid #161616}
  .step .num{flex-shrink:0;width:34px;height:34px;border-radius:50%;background:#2c2c2c;color:var(--gold);font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center}
  .step .stext{font-size:13px;color:var(--txt);line-height:1.55;padding-top:6px}
  .step .stext b{color:var(--gold-soft)}
  .legend-item{display:flex;gap:12px;padding:12px;border-radius:8px;margin-bottom:8px;align-items:center}
  .legend-item .lbadge{font-weight:700;font-size:13px;white-space:nowrap;min-width:120px}
  .legend-item .ldesc{font-size:11px;line-height:1.5}
  .legend-item.green{background:var(--green-bg)} .legend-item.green .lbadge{color:var(--green)} .legend-item.green .ldesc{color:#a8d0b0}
  .legend-item.yellow{background:var(--yellow-bg)} .legend-item.yellow .lbadge{color:var(--yellow)} .legend-item.yellow .ldesc{color:#cbb878}
  .legend-item.red{background:var(--red-bg)} .legend-item.red .lbadge{color:var(--red)} .legend-item.red .ldesc{color:#d0a8a4}
  .princ{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
  .princ .pcard{padding:14px;border-radius:8px;font-size:11px;line-height:1.55}
  .princ .pcard b{display:block;font-family:'DM Sans',sans-serif;font-size:13px;margin-bottom:6px}
  .princ .pcard.blue{background:#0f1520;border:1px solid #1e3050} .princ .pcard.blue b{color:var(--blue-in)} .princ .pcard.blue{color:#9ab0d0}
  .princ .pcard.amber{background:#15120a;border:1px solid #3a3010} .princ .pcard.amber b{color:var(--gold)} .princ .pcard.amber{color:#cbb878}
  .formula-box{background:#0f1520;border:1px solid #1e3050;border-radius:8px;padding:16px;text-align:center;margin-top:8px}
  .formula-box .f{font-family:'IBM Plex Mono',monospace;color:var(--blue-in);font-size:14px;font-weight:600}
  .formula-box .ex{color:#666;font-size:11px;margin-top:8px}
  @media(max-width:680px){
    .cfg-grid,.princ{grid-template-columns:1fr}
    .proj-name{max-width:40vw}
    .irow input{font-size:11px}
  }
  /* Print: only folha de rosto */
  @media print{
    body{background:#fff}
    .top,.tabs,.btn-row,.no-print{display:none!important}
    .view{display:none!important;padding:0}
    .view.active{display:block!important}
    .fr{border-radius:0}
    .fr-internal{display:none!important}
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">

  <div class="top">
    <div class="brand">
      <div class="eyebrow">Stage Films</div>
      <input class="proj-name" id="projName" value="Ford Ranger Limited — 2 Diárias">
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span id="saveHint" style="font-size:10px;color:#444"></span>
      <button class="btn" style="padding:7px 14px;font-size:11px" onclick="salvarNoHistorico()">💾 Salvar no histórico</button>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <!-- VIEWS -->
  <div class="view" id="v-inicio"></div>
  <div class="view" id="v-dados"></div>
  <div class="view" id="v-rosto"></div>
  <div class="view" id="v-analise"></div>
  <div class="view" id="v-saude"></div>
  <div class="view" id="v-ajuste"></div>
  <div class="view" id="v-historico"></div>
</div>

<script>
/* ============ CONFIG SUPABASE (nuvem compartilhada) ============ */
/* Preencha com os dados do seu projeto Supabase.
   Enquanto estiver vazio, o app usa só o navegador (local). */
const SUPABASE_URL  = "https://lvhokpuljxotfhlxzfai.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2aG9rcHVsanhvdGZobHh6ZmFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODg5MTIsImV4cCI6MjA5NzQ2NDkxMn0.cabQcx1hJuB0FLTSOysXgk3OgDlE3ACUeE4o-P5QBSs";

let sb = null;
const cloudOn = () => SUPABASE_URL.startsWith("http") && SUPABASE_ANON.length > 20;
if(cloudOn() && window.supabase){
  try{ sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON); }catch(e){ console.error("Supabase init falhou", e); }
}

/* ============ DATA MODEL ============ */
const CATS = [
  {id:"pre",label:"Pré-produção",icon:"📋"},
  {id:"locacao",label:"Locação / Cenografia",icon:"📍"},
  {id:"producao",label:"Produção — Dia 1",icon:"🎬"},
  {id:"tecnica",label:"Técnica — Dia 1",icon:"🎥"},
  {id:"equip",label:"Equipamentos / Pré-light",icon:"🔦"},
  {id:"logistica",label:"Logística / Alimentação",icon:"🚚"},
  {id:"elenco",label:"Elenco",icon:"⭐"},
  {id:"pos",label:"Pós-produção",icon:"✂️"},
  {id:"reembolsos",label:"Reembolsos",icon:"🧾"},
];
const CAT_LABEL_FR = {
  pre:"1.  Pré-produção", producao:"2.  Produção", locacao:"3.  Locação / Cenografia",
  tecnica:"4.  Equipes Técnicas / Diária de Filmagem", equip:"5.  Equipamentos / Pré-light",
  logistica:"6.  Alimentos / Transporte / Hospedagem", elenco:"7.  Elenco",
  pos:"8.  Finalização / Pós-Produção", reembolsos:"9.  Reembolsos"
};
const FR_ORDER = ["pre","producao","locacao","tecnica","equip","logistica","elenco","pos","reembolsos"];

const DEFAULTS = {
  projName:"Ford Ranger Limited — 2 Diárias",
  cliente:"Ford Brasil", data:"", responsavel:"Stage Films",
  fiscal:{taxa:30, imposto:15, desconto:0, verba:65000, reservaPct:0},
  items:{
    pre:[{d:"Dir. Produção",q:1,vi:3000,v:3000,i:"Lua"},{d:"Pré-Operacional",q:1,vi:1000,v:1000,i:"Nayla"}],
    locacao:[{d:"Locação",q:1,vi:3500,v:3500,i:"Fazenda Embauva"}],
    producao:[{d:"Detailler",q:2,vi:800,v:800,i:"Paulo Cera"}],
    tecnica:[
      {d:"Diretor (2 diárias)",q:1,vi:10000,v:10000,i:"Spina"},
      {d:"Dir. Fotografia",q:2,vi:3000,v:3000,i:""},
      {d:"Assist. Fotografia",q:2,vi:1500,v:1500,i:""},
      {d:"Drone FPV GoPro+Mavic",q:2,vi:2000,v:2000,i:""}],
    equip:[{d:"Aluguel Fotografia — Matheus",q:2,vi:2000,v:2000,i:""}],
    logistica:[{d:"Catering por conta",q:8,vi:120,v:120,i:""},{d:"Carretinha",q:2,vi:500,v:500,i:""},{d:"Combustível",q:1,vi:200,v:200,i:""}],
    elenco:[],
    pos:[{d:"Chefe de Edição",q:1,vi:5000,v:5000,i:"Spina"},{d:"Fotos",q:30,vi:500,v:500,i:"Spina"}],
    reembolsos:[]
  },
  ajustes:[
    {cat:"Pós-Produção",item:"Fotos (entrega final)",qo:30,vo:15000,qa:15,va:7500,obs:"Redução do volume de fotos editadas"},
    {cat:"Equipes Técnicas",item:"Diretor — diárias",qo:2,vo:10000,qa:1,va:5000,obs:"Direção em 1 diária ao invés de 2"},
    {cat:"Logística",item:"Equipe em set",qo:8,vo:960,qa:5,va:600,obs:"Equipe reduzida de 8 para 5 pessoas"},
  ],
  openCats:{tecnica:true},
  showIdeal:false
};

const KEY="stage_orcamento_html_v1";
const HKEY="stage_orcamento_historico_v1";
let S = load();
function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw){return migrate(JSON.parse(raw));}
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULTS));
}
function migrate(st){
  // garante campos novos em dados antigos
  if(st.showIdeal===undefined) st.showIdeal=false;
  if(st.fiscal && st.fiscal.reservaPct===undefined) st.fiscal.reservaPct=0;
  if(st.items){
    Object.keys(st.items).forEach(cat=>{
      (st.items[cat]||[]).forEach(it=>{
        if(it.vi===undefined) it.vi = (it.v!==undefined?it.v:0); // ideal = cobrado por padrão
        // remove campos antigos de custo, se existirem
        delete it.c; delete it.ce; delete it.cr;
      });
    });
  }
  return st;
}
let saveTimer=null;
function save(){
  try{
    localStorage.setItem(KEY,JSON.stringify(S));
    const h=document.getElementById('saveHint');
    if(h){h.textContent='✓ salvo'; clearTimeout(saveTimer); saveTimer=setTimeout(()=>h.textContent='',1500);}
  }catch(e){}
}


/* ============ HISTÓRICO (compartilhado via Supabase, com fallback local) ============ */
let histCache = [];      // cópia em memória usada pela tela
let histLoaded = false;
let lastCloudError = null;

function loadHistLocal(){
  try{const raw=localStorage.getItem(HKEY); if(raw) return JSON.parse(raw);}catch(e){}
  return [];
}
function saveHistLocal(list){
  try{localStorage.setItem(HKEY,JSON.stringify(list));}catch(e){}
}

// Carrega do banco (ou local) e atualiza a tela
async function fetchHist(){
  if(cloudOn() && sb){
    try{
      const {data,error} = await sb.from('orcamentos').select('*').order('ts',{ascending:false});
      if(error) throw error;
      histCache = (data||[]).map(r=>({
        id:r.id, nome:r.nome, cliente:r.cliente, data:r.data, ts:r.ts,
        total:r.total, verba:r.verba, lucro:r.lucro, status:r.status, estado:r.estado
      }));
      histLoaded = true;
      saveHistLocal(histCache); // espelho local p/ offline
      if(activeTab==='historico') renderHistorico();
      return;
    }catch(e){
      lastCloudError = (e&&e.message) ? e.message : JSON.stringify(e);
      console.error("Falha ao buscar na nuvem, usando local:", lastCloudError);
    }
  }
  histCache = loadHistLocal();
  histLoaded = true;
  if(activeTab==='historico') renderHistorico();
}

async function testarConexao(){
  lastCloudError = null;
  if(!cloudOn()){ lastCloudError = "Chaves do Supabase não configuradas no código."; renderHistorico(); return; }
  if(!sb){ lastCloudError = "Cliente Supabase não inicializou (biblioteca não carregou)."; renderHistorico(); return; }
  try{
    const {data,error} = await sb.from('orcamentos').select('id').limit(1);
    if(error) throw error;
    lastCloudError = null;
    flashSync("✓ conexão OK — "+(data?data.length:0)+" registro(s) encontrado(s)");
  }catch(e){
    lastCloudError = (e&&e.message) ? e.message : JSON.stringify(e);
  }
  renderHistorico();
}

function snapshotCurrent(){
  const copy = JSON.parse(JSON.stringify(S));
  const k = calc();
  const h = healthState();
  const usaVerba = S.fiscal.verba>0 && S.fiscal.verba < k.totalCalc;
  return {
    id: "p"+Date.now(),
    nome: S.projName || "Sem nome",
    cliente: S.cliente || "",
    data: new Date().toLocaleDateString('pt-BR'),
    ts: Date.now(),
    total: k.totalCalc,
    verba: S.fiscal.verba,
    lucro: usaVerba ? k.lucroNaVerba : k.lucro,
    status: h.key,
    estado: copy
  };
}

async function salvarNoHistorico(){
  const snap = snapshotCurrent();
  const dup = histCache.find(p=>p.nome===snap.nome);
  if(dup){
    if(!confirm(`Já existe "${snap.nome}" no histórico. Deseja salvar como uma nova versão?\n\n(OK = nova versão · Cancelar = não salvar)`)){
      return;
    }
    snap.nome = snap.nome + " (v" + (histCache.filter(p=>p.nome.startsWith(dup.nome)).length+1) + ")";
  }
  // otimista: já mostra na tela
  histCache.unshift(snap);
  saveHistLocal(histCache);
  renderHistorico();

  if(cloudOn() && sb){
    try{
      const {error} = await sb.from('orcamentos').insert([snap]);
      if(error) throw error;
      flashSync("✓ salvo na nuvem");
    }catch(e){
      lastCloudError = (e&&e.message) ? e.message : JSON.stringify(e);
      console.error("Erro ao salvar na nuvem:", lastCloudError);
      flashSync("⚠ salvo só localmente (sem conexão)");
      renderHistorico();
    }
  }else{
    flashSync("✓ salvo (local)");
  }
}

function abrirDoHistorico(id){
  const p = histCache.find(x=>x.id===id);
  if(!p) return;
  if(!confirm(`Abrir "${p.nome}"? As alterações não salvas no orçamento atual serão perdidas.`)) return;
  S = JSON.parse(JSON.stringify(p.estado));
  S = migrate(S);
  save();
  const pn=document.getElementById('projName'); if(pn) pn.value = S.projName;
  go('dados');
}

async function apagarDoHistorico(id){
  const p = histCache.find(x=>x.id===id);
  if(!p) return;
  if(!confirm(`Apagar "${p.nome}" do histórico? Isso remove para você e seu par. Não pode ser desfeito.`)) return;
  histCache = histCache.filter(x=>x.id!==id);
  saveHistLocal(histCache);
  renderHistorico();
  if(cloudOn() && sb){
    try{ await sb.from('orcamentos').delete().eq('id',id); flashSync("✓ removido da nuvem"); }
    catch(e){ console.error("Erro ao apagar na nuvem:", (e&&e.message)||JSON.stringify(e)); flashSync("⚠ removido só localmente"); }
  }
}

/* ============ HELPERS ============ */
const fmt=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const ceil5=v=>Math.ceil((v||0)/5)*5;  // arredonda pra cima até o próximo múltiplo de 5
const pct=v=>(v*100).toFixed(1).replace('.',',')+'%';
const num=v=>{
  if(v===''||v===null||v===undefined) return 0;
  let s=String(v).trim();
  // se tem vírgula, é formato BR (1.234,56) -> tira pontos de milhar, vírgula vira ponto
  if(s.indexOf(',')>=0){ s=s.replace(/\./g,'').replace(',','.'); }
  // senão, é número padrão (ponto = decimal) -> deixa como está
  const n=parseFloat(s);
  return isNaN(n)?0:n;
};

function catTotal(id){return (S.items[id]||[]).reduce((s,it)=>s+(it.q||0)*(it.v||0),0);}   // valor COBRADO (soma)
function catIdeal(id){return (S.items[id]||[]).reduce((s,it)=>s+(it.q||0)*(it.vi||0),0);}  // valor IDEAL (comparação)
function subtotal(){return CATS.reduce((s,c)=>s+catTotal(c.id),0);}
function subtotalIdeal(){return CATS.reduce((s,c)=>s+catIdeal(c.id),0);}

function calc(){
  const sub=subtotal();          // subtotal COBRADO = custo de produção (o que soma)
  const subIdeal=subtotalIdeal(); // subtotal IDEAL (referência/meta por item)
  const t=S.fiscal.taxa/100, i=S.fiscal.imposto/100, d=S.fiscal.desconto/100;

  // Preço com taxa + imposto (ambos somados por cima do subtotal)
  const totalCalc  = sub*(1+t+i-d);       // total que vai ao cliente, com base no que está cobrado hoje
  const totalIdeal = subIdeal*(1+t+i-d);  // total se cobrasse o ideal cheio em todo item
  const taxaVal = sub*t, impVal = sub*i, descVal = sub*d;

  // LUCRO REAL = Taxa da Produtora cheia (o imposto é repassado ao cliente, não toca a Stage)
  const lucro = taxaVal - descVal;
  const margem = totalCalc>0 ? lucro/totalCalc : 0;

  // Verba negociada (cliente). Se 0, usa o total calculado.
  const verba = S.fiscal.verba>0 ? S.fiscal.verba : totalCalc;

  // Gap entre o que a verba permite e o que está sendo cobrado hoje
  // gapVerba > 0  => tem folga (verba maior que o total atual) -> dá pra subir itens
  // gapVerba < 0  => falta verba (verba menor que o total atual) -> precisa cortar
  const gapVerba = verba - totalCalc;

  // Reserva de segurança: % do gap (quando positivo) que vai virar aumento real nos itens,
  // subindo cada item na direção do seu Valor Ideal (limitado ao próprio ideal — nunca passa dele)
  const reservaPct = (S.fiscal.reservaPct||0)/100;
  const folgaDisponivel = Math.max(0, subIdeal - sub); // o quanto ainda dá pra subir (limitado pelo ideal)
  // Convertendo o gap (que está em valor FINAL, com taxa+imposto) para impacto no SUBTOTAL:
  const gapEmSubtotal = gapVerba>0 ? gapVerba/(1+t+i) : 0;
  const reservaAlvo = Math.min(folgaDisponivel, gapEmSubtotal) * reservaPct; // quanto subir no subtotal
  const subComReserva = sub + reservaAlvo;
  const totalComReserva = subComReserva*(1+t+i-d);
  const lucroComReserva = subComReserva*t - descVal;

  // Disciplina de preço (quando usa Valor Ideal): ideal × cobrado
  const descontoVsIdeal = totalIdeal - totalCalc;
  const descontoVsIdealP = totalIdeal>0 ? descontoVsIdeal/totalIdeal : 0;

  // Para Ajuste de Escopo: custo máx de produção que cabe na verba (quando a verba é MENOR que o total)
  const custoMax = S.fiscal.verba>0 ? verba/(1+t+i) : sub;
  const corteR = Math.max(0, sub - custoMax);
  const corteP = sub>0 ? corteR/sub : 0;

  // Lucro se a verba negociada for menor que o total calculado:
  const custoMaisImposto = sub + impVal;
  const lucroNaVerba = verba - custoMaisImposto;

  // Cenário IDEAL (se cobrasse o valor cheio de cada item)
  const taxaIdealVal = subIdeal*t;       // lucro no cenário ideal
  const impIdealVal = subIdeal*i;
  const lucroIdeal = taxaIdealVal - descVal;
  const margemIdeal = totalIdeal>0 ? lucroIdeal/totalIdeal : 0;

  return {sub,subIdeal,totalCalc,totalIdeal,taxaVal,impVal,descVal,
    lucro,margem,verba,gapVerba,reservaPct,folgaDisponivel,reservaAlvo,
    subComReserva,totalComReserva,lucroComReserva,
    descontoVsIdeal,descontoVsIdealP,
    taxaIdealVal,impIdealVal,lucroIdeal,margemIdeal,
    custoMax,corteR,corteP,custoMaisImposto,lucroNaVerba,t,i,d};
}

function healthState(){
  const k=calc();
  const usaVerba = S.fiscal.verba>0 && S.fiscal.verba < k.totalCalc;
  const lucroReal = usaVerba ? k.lucroNaVerba : k.lucro;
  // referência = lucro cheio (taxa da produtora sobre o subtotal)
  const lucroAlvo = k.taxaVal;

  if(lucroReal <= 0)
    return {key:"red",emoji:"🔴",text:"PREJUÍZO — A VERBA NÃO COBRE CUSTO + IMPOSTO",sub:"O que o cliente paga não cobre a produção e o imposto. Reveja escopo ou renegocie antes de fechar."};
  if(lucroReal < lucroAlvo*0.85)  // lucro real abaixo de 85% do lucro cheio
    return {key:"yellow",emoji:"🟡",text:"LUCRO APERTADO — ABAIXO DA META",sub:"Sobra dinheiro, mas menos do que a Taxa da Produtora cheia. Sustentável, sem gordura para imprevisto."};
  return {key:"green",emoji:"🟢",text:"SAUDÁVEL — LUCRO PRESERVADO",sub:"A Taxa da Produtora está sendo preservada. Projeto lucrativo."};
}

/* ============ RENDER: ANÁLISE DE CUSTOS ============ */
function renderAnalise(){
  const k=calc();

  // Bloco 1: comparação ideal × cobrado (só se o Valor Ideal estiver ativo e houver diferença)
  let idealBlock = '';
  if(S.showIdeal && Math.abs(k.subIdeal-k.sub)>0.01){
    const rows = CATS.map(c=>{
      const ideal=catIdeal(c.id), cob=catTotal(c.id), dif=ideal-cob;
      const difP = ideal>0 ? dif/ideal : 0;
      if(ideal===0 && cob===0) return '';
      const cls = dif>0 ? 'v-yellow' : (dif<0 ? 'v-green' : '');
      const sign = dif>0?'−':(dif<0?'+':'');
      return `<tr><td>${c.icon} ${c.label}</td><td style="color:#d4b84a">${fmt(ideal)}</td><td>${fmt(cob)}</td><td class="${cls}" style="font-weight:600">${dif!==0?sign+fmt(Math.abs(dif)):fmt(0)}</td><td class="${cls}">${ideal>0&&dif!==0?(sign+pct(Math.abs(difP))):'—'}</td></tr>`;
    }).join('');
    const totDif=k.subIdeal-k.sub, totDifP=k.subIdeal>0?totDif/k.subIdeal:0;
    idealBlock = `
    <div class="panel">
      <div class="panel-title">Valor ideal × Valor cobrado — quanto de desconto você deu</div>
      <table class="an-table">
        <tr><th>Categoria</th><th>Ideal</th><th>Cobrado</th><th>Desconto (R$)</th><th>%</th></tr>
        ${rows}
        <tr class="total-row"><td>TOTAL</td><td style="color:#d4b84a">${fmt(k.subIdeal)}</td><td>${fmt(k.sub)}</td><td class="v-yellow">−${fmt(totDif)}</td><td class="v-yellow">−${pct(totDifP)}</td></tr>
      </table>
    </div>`;
  }

  // Bloco 2: composição do lucro (sempre)
  const usaVerba = S.fiscal.verba>0 && S.fiscal.verba < k.totalCalc;
  const lucroReal = usaVerba ? k.lucroNaVerba : k.lucro;

  document.getElementById('v-analise').innerHTML=`
  ${idealBlock}
  <div class="panel">
    <div class="panel-title">De onde vem o dinheiro — para onde vai cada parte do que o cliente paga</div>
    <div class="res-row"><span class="rlabel">Custo de produção (vai p/ fornecedores e equipe)</span><span class="rval">${fmt(k.sub)}</span></div>
    <div class="res-row"><span class="rlabel">Impostos / NF (vai p/ o governo)</span><span class="rval">${fmt(k.impVal)}</span></div>
    <div class="res-row"><span class="rlabel" style="color:var(--green)">Taxa da Produtora (fica com a Stage)</span><span class="rval v-green">${fmt(k.taxaVal)}</span></div>
    ${S.fiscal.desconto>0?`<div class="res-row"><span class="rlabel">Desconto concedido</span><span class="rval v-red">−${fmt(k.descVal)}</span></div>`:''}
    <div class="res-row"><span class="rlabel" style="color:var(--gold)">Total a cobrar</span><span class="rval" style="color:var(--gold)">${fmt(k.totalCalc)}</span></div>
  </div>
  <div class="panel">
    <div class="panel-title">Resultado para a Stage</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="k-label">Lucro real</div><div class="k-val ${lucroReal>0?'v-green':'v-red'}">${fmt(lucroReal)}</div></div>
      <div class="kpi"><div class="k-label">Taxa da Produtora</div><div class="k-val">${pct(k.t)}</div></div>
      <div class="kpi"><div class="k-label">Verba negociada</div><div class="k-val">${fmt(k.verba)}</div></div>
    </div>
  </div>`;
}

      ${kpisIdeal.map(([l,v,c])=>`<div class="kpi" style="border-color:#2a2410"><div class="k-label">${l}</div><div class="k-val ${c}">${v}</div></div>`).join('')}

/* ============ RENDER: AJUSTE DE ESCOPO ============ */
function renderAjuste(){
  const k=calc();
  const totalEcon = S.ajustes.reduce((s,a)=>s+(num(a.vo)-num(a.va)),0);
  const meta = k.corteR;
  const ok = totalEcon>=meta;
  const rows=S.ajustes.map((a,idx)=>`
    <tr>
      <td style="width:120px"><input class="txt" value="${esc(a.cat)}" oninput="updAj(${idx},'cat',this.value)"></td>
      <td><input class="txt" value="${esc(a.item)}" oninput="updAj(${idx},'item',this.value)"></td>
      <td style="width:50px"><input type="number" value="${a.qo}" oninput="updAj(${idx},'qo',this.value)"></td>
      <td style="width:90px"><input type="number" value="${a.vo}" oninput="updAj(${idx},'vo',this.value)"></td>
      <td style="width:50px"><input type="number" value="${a.qa}" oninput="updAj(${idx},'qa',this.value)"></td>
      <td style="width:90px"><input type="number" value="${a.va}" oninput="updAj(${idx},'va',this.value)"></td>
      <td class="econ" style="width:90px">${fmt(num(a.vo)-num(a.va))}</td>
      <td style="width:28px"><button class="del" onclick="delAj(${idx})" style="background:none;border:none;color:#444;cursor:pointer">✕</button></td>
    </tr>`).join('');

  // client text
  let ctext=`Para adequar o orçamento à verba aprovada de ${fmt(S.fiscal.verba)}, realizamos os seguintes ajustes de escopo em relação à proposta original (${fmt(k.totalCalc)}):\n\n`;
  S.ajustes.forEach(a=>{if(a.item)ctext+=`• ${a.item}: de ${a.qo} para ${a.qa} — ${a.obs}\n`;});
  ctext+=`\nEsses ajustes resultam em uma redução de ${fmt(totalEcon)} no custo de produção, refletindo proporcionalmente na taxa e nos impostos, chegando ao valor final de ${fmt(S.fiscal.verba)}.`;

  document.getElementById('v-ajuste').innerHTML=`
  <div class="panel">
    <div class="panel-title">Ajuste de escopo — original × adequado à verba</div>
    <div class="kpi-grid" style="margin-bottom:16px">
      <div class="kpi"><div class="k-label">Orçamento original</div><div class="k-val">${fmt(k.totalCalc)}</div></div>
      <div class="kpi"><div class="k-label">Verba aprovada</div><div class="k-val" style="color:var(--blue-in)">${fmt(S.fiscal.verba)}</div></div>
      <div class="kpi"><div class="k-label">Meta de corte na produção</div><div class="k-val v-yellow">${fmt(meta)}</div></div>
    </div>
    <div class="callout">⚠ Taxa (${S.fiscal.taxa}%) e impostos (${S.fiscal.imposto}%) são calculados sobre o custo de produção. Reduzindo <b>${fmt(meta)}</b> na produção, taxa e impostos caem proporcionalmente e o total chega aos ${fmt(S.fiscal.verba)} aprovados.</div>
    <table class="aj-table">
      <tr><th>Categoria</th><th>Item / justificativa</th><th>Qtd orig.</th><th>Valor orig.</th><th>Qtd ajust.</th><th>Valor ajust.</th><th style="text-align:right">Economia</th><th></th></tr>
      ${rows}
    </table>
    <button class="add-item" onclick="addAj()">+ Adicionar linha de ajuste</button>
    <div class="res-row" style="margin-top:14px"><span class="rlabel" style="color:var(--gold)">Total economizado na produção</span><span class="rval" style="color:var(--gold);font-size:16px">${fmt(totalEcon)}</span></div>
    <div class="status ${ok?'green':'yellow'}" style="margin-top:12px;padding:14px">
      <div class="s-text" style="font-size:14px">${ok?'✅ Economia suficiente — escopo cabe na verba':'⚠️ Faltam '+fmt(meta-totalEcon)+' para atingir a meta'}</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Texto para enviar ao cliente</div>
    <div class="client-text" id="clientText">${esc(ctext)}</div>
    <button class="btn btn-ghost" style="margin-top:12px" onclick="copyText()">Copiar texto</button>
  </div>`;
}

function copyText(){
  const t=document.getElementById('clientText').innerText;
  navigator.clipboard.writeText(t).then(()=>{
    event.target.textContent='✓ Copiado';
    setTimeout(()=>event.target.textContent='Copiar texto',1500);
  });
}

function upd(cat,idx,field,val){
  const it=S.items[cat][idx];
  it[field] = (field==='q'||field==='v'||field==='vi') ? num(val) : val;
  save();
  // live-update the row total + category total + tab dot, without re-rendering (keeps input focus)
  liveUpdateDados();
}
function liveUpdateDados(){
  // update each category total label
  CATS.forEach((c)=>{
    const el=document.querySelector(`#tot-${c.id}`);
    const t=catTotal(c.id);
    if(el){el.textContent=fmt(t);el.className='cat-total '+(t?'':'zero');}
  });
  // update each row total
  CATS.forEach((c)=>{
    (S.items[c.id]||[]).forEach((it,idx)=>{
      const el=document.querySelector(`#rowtot-${c.id}-${idx}`);
      if(el)el.textContent=fmt(it.q*it.v);
    });
  });
  // update result panel
  refreshResultPanel();
  renderTabs();
}
function refreshResultPanel(){
  const el=document.getElementById('resultPanel');
  if(el)el.innerHTML=resultPanelHTML();
}
function updFiscal(field,val){
  S.fiscal[field]=num(val);
  save();
  refreshResultPanel();
  renderTabs();
}
function toggleCat(id){S.openCats[id]=!S.openCats[id];save();renderDados();}
function toggleIdeal(){S.showIdeal=!S.showIdeal;save();renderDados();}
function addItem(cat){if(!S.items[cat])S.items[cat]=[];S.items[cat].push({d:"",q:1,vi:0,v:0,i:""});S.openCats[cat]=true;save();renderDados();}
function delItem(cat,idx){S.items[cat].splice(idx,1);save();renderDados();}
function updAj(idx,field,val){S.ajustes[idx][field]=(['qo','vo','qa','va'].includes(field))?num(val):val;save();renderAjuste();}
function addAj(){S.ajustes.push({cat:"",item:"",qo:0,vo:0,qa:0,va:0,obs:""});save();renderAjuste();}
function delAj(idx){S.ajustes.splice(idx,1);save();renderAjuste();}

document.getElementById('projName').addEventListener('input',e=>{S.projName=e.target.value;save();});

/* ============ INIT ============ */
go('inicio');
fetchHist(); // carrega histórico compartilhado em segundo plano
</script>
