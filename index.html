<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage Films — Orçamento de Produção</title>
<style>
  :root{
    --bg:#faf8f4; --panel:#ffffff; --panel2:#f5f3ef; --line:#e5e0d8;
    --gold:#b8941e; --gold-soft:#c9a227; --txt:#1f1f1f; --txt-dim:#6b6b6b;
    --blue-in:#3b7dd8; --input-bg:#ffffff;
    --green:#2d8a4e; --green-bg:#edf7f0;
    --yellow:#b8860b; --yellow-bg:#fdf6e3;
    --red:#c0392b; --red-bg:#fdf0ef;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:'DM Sans','Inter',system-ui,sans-serif;font-size:13px;line-height:1.5}
  .app{max-width:1180px;margin:0 auto;padding:0 0 80px}
  /* Header */
  .top{background:#ffffff;border-bottom:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.04);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:50}
  .brand{font-family:'DM Sans',system-ui,sans-serif}
  .brand .eyebrow{font-size:10px;letter-spacing:.25em;color:var(--txt-dim);text-transform:uppercase}
  .brand h1{font-size:19px;font-weight:700;color:var(--txt);letter-spacing:-.01em;margin-top:2px}
  .proj-name{background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--txt);font:inherit;font-family:'DM Sans',sans-serif;font-size:19px;font-weight:700;padding:2px 0;width:340px;max-width:50vw}
  .proj-name:focus{outline:none;border-color:var(--gold)}
  /* Tabs */
  .tabs{display:flex;gap:4px;background:#ffffff;border-bottom:1px solid var(--line);padding:0 24px;overflow-x:auto;position:sticky;top:73px;z-index:49}
  .tab{padding:12px 18px;background:none;border:none;border-bottom:2px solid transparent;color:var(--txt-dim);font:inherit;font-size:12px;cursor:pointer;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em;transition:.15s}
  .tab:hover{color:var(--txt)}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
  .tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:7px;vertical-align:middle}
  /* Views */
  .view{display:none;padding:24px}
  .view.active{display:block}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px}
  .panel-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt-dim);margin-bottom:14px}
  /* Sections (categorias) */
  .cat{border:1px solid var(--line);border-radius:8px;margin-bottom:8px;overflow:hidden}
  .cat-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;background:var(--panel);user-select:none}
  .cat-head:hover{background:var(--panel2)}
  .cat-head .label{display:flex;align-items:center;gap:10px;font-size:12px;text-transform:uppercase;letter-spacing:.05em}
  .cat-head .icon{font-size:14px}
  .cat-total{color:var(--gold);font-weight:500}
  .cat-total.zero{color:#444}
  .cat-body{display:none;padding:0 16px 14px;background:var(--panel2)}
  .cat.open .cat-body{display:block}
  .cat.open .cat-head{background:var(--panel2)}
  .cat-act{background:none;border:none;color:#777;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;line-height:1}
  .cat-act:hover{background:rgba(0,0,0,.05);color:var(--gold)}
  .dest-sel{width:100%;background:var(--input-bg);border:1px solid var(--line);border-radius:5px;color:var(--txt);font:inherit;font-size:11px;padding:6px 4px;cursor:pointer}
  .dest-sel:focus{outline:none;border-color:var(--gold)}
  .chev{color:#555;font-size:10px;transition:transform .2s}
  .cat.open .chev{transform:rotate(180deg)}
  /* Item table */
  table{width:100%;border-collapse:collapse}
  .ihead th{font-size:9px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.08em;text-align:left;padding:8px 6px 6px;border-bottom:1px solid var(--line);font-weight:400}
  .irow td{padding:5px 6px;border-bottom:1px solid #141414;vertical-align:middle}
  .irow input{background:var(--input-bg);border:1px solid #222;border-radius:4px;color:var(--blue-in);font:inherit;font-size:12px;padding:5px 7px;width:100%}
  .irow input:focus{outline:none;border-color:var(--gold)}
  .irow input.txt{color:var(--txt);text-align:left}
  .irow input.num{text-align:center}
  /* remove setinhas do type=number que atrapalham campos estreitos */
  .irow input[type=number]::-webkit-inner-spin-button,
  .irow input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  .irow input[type=number]{-moz-appearance:textfield}
  .aj-table input[type=number]::-webkit-inner-spin-button,
  .aj-table input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  .aj-table input[type=number]{-moz-appearance:textfield}
  .irow input.money{text-align:right}
  .irow .total{color:var(--gold);font-weight:500;text-align:right;font-size:12px;white-space:nowrap}
  .irow .del{background:none;border:none;color:#444;cursor:pointer;font-size:13px;padding:2px}
  .irow .del:hover{color:var(--red)}
  .add-item{margin-top:10px;padding:6px 12px;background:none;border:1px dashed #2a2a2a;border-radius:4px;color:#555;font:inherit;font-size:10px;cursor:pointer;text-transform:uppercase;letter-spacing:.08em}
  .add-item:hover{border-color:var(--gold);color:var(--gold)}
  /* Config fiscal */
  .cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .cfg-field label{display:block;font-size:10px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
  .cfg-field .hint{color:#555;text-transform:none;letter-spacing:0}
  .cfg-field input{width:100%;background:var(--input-bg);border:1px solid #222;border-bottom:2px solid var(--gold);border-radius:4px;color:var(--blue-in);font:inherit;font-size:16px;font-weight:700;padding:8px 10px;text-align:right}
  .cfg-field input:focus{outline:none;border-color:var(--gold-soft)}
  /* Result rows */
  .res-row{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid #181818}
  .res-row .rlabel{font-size:11px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.04em}
  .res-row .rlabel.sub{padding-left:14px;text-transform:none;color:#666}
  .res-row .rval{font-size:13px;color:var(--txt);font-weight:500}
  .res-big{padding:14px;border:1px solid var(--line);border-radius:8px;margin-top:12px;background:#0a0a0a}
  .res-big .rb-label{font-size:10px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
  .res-big .rb-val{font-size:26px;font-weight:700;font-family:'DM Sans',sans-serif;color:var(--gold)}
  .res-big.lucro .rb-val{font-size:22px}
  /* KPI grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px}
  .kpi .k-label{font-size:9px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
  .kpi .k-val{font-size:17px;font-weight:700;font-family:'DM Sans',sans-serif}
  /* Status banner */
  .status{border-radius:10px;padding:24px;text-align:center;margin-bottom:16px;border:1px solid}
  .status .s-emoji{font-size:32px;display:block;margin-bottom:8px}
  .status .s-text{font-size:18px;font-weight:700;font-family:'DM Sans',sans-serif;letter-spacing:-.01em}
  .status .s-sub{font-size:12px;margin-top:6px;opacity:.85}
  .status.green{background:var(--green-bg);border-color:#a0d4b0;color:var(--green)}
  .status.yellow{background:var(--yellow-bg);border-color:#d4c080;color:var(--yellow)}
  .status.red{background:var(--red-bg);border-color:#d4a0a0;color:var(--red)}
  /* Generic colored values */
  .v-green{color:var(--green)} .v-yellow{color:var(--yellow)} .v-red{color:var(--red)}
  /* Folha de rosto */
  .fr{background:#fff;color:#222;border-radius:10px;overflow:hidden;font-family:'DM Sans',Arial,sans-serif}
  .fr-head{background:#0d0d0d;color:#fff;padding:28px;text-align:center}
  .fr-head .fr-brand{font-size:30px;font-weight:700;color:var(--gold);letter-spacing:.02em}
  .fr-head .fr-sub{font-size:11px;color:#999;letter-spacing:.1em;margin-top:6px;text-transform:uppercase}
  .fr-info{background:#1a1a1a;padding:14px 28px}
  .fr-info .fr-irow{display:flex;justify-content:flex-end;gap:10px;padding:3px 0}
  .fr-info .fr-ilabel{color:#888;font-size:11px;font-weight:600}
  .fr-info .fr-ival{color:var(--gold);font-size:12px;font-weight:600;min-width:240px}
  .fr-body{padding:24px 28px}
  .fr-table{width:100%;border-collapse:collapse}
  .fr-table th{background:#1f4e79;color:#fff;font-size:11px;padding:10px 12px;text-align:left;letter-spacing:.04em}
  .fr-table th.r{text-align:right}.fr-table th.c{text-align:center}
  .fr-table td{padding:9px 12px;border-bottom:1px solid #eee;font-size:13px;color:#333}
  .fr-table td.r{text-align:right;color:#1f4e79;font-variant-numeric:tabular-nums}
  .fr-table td.c{text-align:center;font-weight:700;color:#1f4e79}
  .fr-table tr:nth-child(even) td{background:#f8f8f8}
  .fr-table tr.sub td{background:#e8e8e8;font-weight:700;color:#1a1a1a;border-top:2px solid #999;border-bottom:2px solid #999;font-size:14px}
  .fr-table tr.fiscal td{background:#fff}
  .fr-table tr.total td{background:#0d0d0d;color:#fff;font-weight:700;font-size:17px;border:none}
  .fr-table tr.total td.r{color:var(--gold)}
  .fr-obs{padding:18px 28px 28px}
  .fr-obs h4{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
  .fr-obs li{font-size:10px;color:#666;margin-bottom:4px;list-style:none;padding-left:12px;position:relative}
  .fr-obs li::before{content:'·';position:absolute;left:2px}
  /* Analysis table */
  .an-table{width:100%;border-collapse:collapse;font-size:12px}
  .an-table th{background:var(--panel2);color:var(--gold);font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:9px 8px;text-align:right;font-weight:500;border-bottom:1px solid var(--line)}
  .an-table th:first-child{text-align:left}
  .an-table td{padding:8px;border-bottom:1px solid #141414;text-align:right;font-variant-numeric:tabular-nums}
  .an-table td:first-child{text-align:left;color:var(--txt)}
  .an-table tr.total-row td{border-top:1px solid var(--line);font-weight:700;color:var(--txt);background:#0a0a0a}
  /* Ajuste escopo */
  .aj-table{width:100%;border-collapse:collapse;font-size:12px}
  .aj-table th{background:var(--panel2);color:var(--gold);font-size:9px;text-transform:uppercase;padding:8px 6px;text-align:left;font-weight:500;letter-spacing:.05em}
  .aj-table td{padding:4px 6px;border-bottom:1px solid #141414}
  .aj-table input{background:var(--input-bg);border:1px solid #222;border-radius:4px;color:var(--blue-in);font:inherit;font-size:11px;padding:4px 6px;width:100%}
  .aj-table input:focus{outline:none;border-color:var(--gold)}
  .aj-table input.txt{color:var(--txt)}
  .aj-table .econ{color:var(--green);font-weight:500;text-align:right;white-space:nowrap}
  .callout{border-left:2px solid var(--gold);background:#fdf6e3;border-radius:0 8px 8px 0;padding:12px 14px;font-size:11px;color:#8a6d10;line-height:1.6;margin:12px 0}
  .callout b{color:var(--gold)}
  .client-text{background:#ffffff;border:1px solid var(--line);border:1px solid var(--line);border-radius:8px;padding:16px;font-size:12px;color:#bbb;line-height:1.7;white-space:pre-wrap;margin-top:12px}
  /* Buttons */
  .btn{padding:9px 18px;background:var(--gold);color:#0d0d0d;border:none;border-radius:6px;font:inherit;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.06em}
  .btn:hover{background:var(--gold-soft)}
  .btn-ghost{background:none;border:1px solid var(--line);color:var(--txt-dim)}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
  .btn-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  /* INÍCIO */
  .hero{text-align:center;padding:32px 20px;border-bottom:1px solid var(--line);margin-bottom:24px}
  .hero h2{font-family:'DM Sans',sans-serif;font-size:26px;font-weight:700;color:var(--gold);margin-bottom:8px}
  .hero p{color:var(--txt-dim);font-size:13px}
  .rule{border-left:2px solid var(--gold);background:#fdf6e3;border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:20px;color:var(--gold-soft);font-size:13px;line-height:1.6}
  .steps{counter-reset:step}
  .step{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid #161616}
  .step .num{flex-shrink:0;width:34px;height:34px;border-radius:50%;background:#2c2c2c;color:var(--gold);font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center}
  .step .stext{font-size:13px;color:var(--txt);line-height:1.55;padding-top:6px}
  .step .stext b{color:var(--gold-soft)}
  .legend-item{display:flex;gap:12px;padding:12px;border-radius:8px;margin-bottom:8px;align-items:center}
  .legend-item .lbadge{font-weight:700;font-size:13px;white-space:nowrap;min-width:120px}
  .legend-item .ldesc{font-size:11px;line-height:1.5}
  .legend-item.green{background:var(--green-bg)} .legend-item.green .lbadge{color:var(--green)} .legend-item.green .ldesc{color:#2d6a3e}
  .legend-item.yellow{background:var(--yellow-bg)} .legend-item.yellow .lbadge{color:var(--yellow)} .legend-item.yellow .ldesc{color:#8a6d10}
  .legend-item.red{background:var(--red-bg)} .legend-item.red .lbadge{color:var(--red)} .legend-item.red .ldesc{color:#8a3030}
  .princ{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
  .princ .pcard{padding:14px;border-radius:8px;font-size:11px;line-height:1.55}
  .princ .pcard b{display:block;font-family:'DM Sans',sans-serif;font-size:13px;margin-bottom:6px}
  .princ .pcard.blue{background:#0f1520;border:1px solid #1e3050} .princ .pcard.blue b{color:var(--blue-in)} .princ .pcard.blue{color:#9ab0d0}
  .princ .pcard.amber{background:#fdf6e3;border:1px solid #3a3010} .princ .pcard.amber b{color:var(--gold)} .princ .pcard.amber{color:#8a6d10}
  .formula-box{background:#0f1520;border:1px solid #1e3050;border-radius:8px;padding:16px;text-align:center;margin-top:8px}
  .formula-box .f{font-family:'IBM Plex Mono',monospace;color:var(--blue-in);font-size:14px;font-weight:600}
  .formula-box .ex{color:#666;font-size:11px;margin-top:8px}
  @media(max-width:680px){
    .cfg-grid,.princ{grid-template-columns:1fr}
    .proj-name{max-width:40vw}
    .irow input{font-size:11px}
  }
  /* Print: only folha de rosto */
  /* Folha de Rosto — 6 blocos */
  .rosto-bloco{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:14px}
  .rosto-h{font-size:13px;font-weight:600;color:var(--gold);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--line);letter-spacing:.02em}
  .rosto-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px}
  .rosto-inp{width:100%;background:var(--input-bg);border:1px solid var(--line);border-radius:6px;color:var(--txt);font:inherit;font-size:13px;padding:8px 10px}
  .rosto-inp:focus{outline:none;border-color:var(--gold)}
  .rosto-area{width:100%;background:var(--input-bg);border:1px solid var(--line);border-radius:6px;color:var(--txt);font:inherit;font-size:13px;padding:10px;line-height:1.6;resize:vertical}
  .rosto-area:focus{outline:none;border-color:var(--gold)}
  .rosto-inv{width:100%;border-collapse:collapse;font-size:13px}
  .rosto-inv td{padding:8px 4px;border-bottom:1px solid var(--line)}
  .rosto-inv td.r{text-align:right;font-variant-numeric:tabular-nums}
  .rosto-inv tr.sub td{font-weight:600;border-top:1px solid var(--line)}
  .rosto-inv tr.fiscal td{color:var(--txt-dim)}
  .rosto-inv tr.total td{font-size:16px;font-weight:700;color:var(--gold);border-top:2px solid var(--gold);border-bottom:none;padding-top:12px}
  .mini-edit{background:none;border:none;color:#666;cursor:pointer;font-size:11px;padding:0 4px}
  .mini-edit:hover{color:var(--gold)}
  /* Documento comercial (prévia + PDF) */
  .folha-doc{background:#fff;color:#1a1a1a;border:1px solid var(--line);border-radius:10px;padding:38px 44px;max-width:760px;margin:0 auto;font-family:'DM Sans',sans-serif}
  .fd-head{border-bottom:2px solid #c9a227;padding-bottom:18px;margin-bottom:24px}
  .fd-title{font-size:26px;font-weight:700;color:#0d0d0d;margin-bottom:10px}
  .fd-meta{display:flex;flex-wrap:wrap;gap:6px 20px;font-size:12px;color:#555}
  .fd-meta b{color:#0d0d0d;font-weight:600}
  .fd-sec{margin-bottom:26px}
  .fd-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#c9a227;margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:5px}
  .fd-body{font-size:13px;line-height:1.7;color:#2a2a2a}
  .fd-inv{width:100%;border-collapse:collapse;font-size:13px;color:#2a2a2a}
  .fd-inv td{padding:9px 4px;border-bottom:1px solid #eee}
  .fd-inv td.r{text-align:right;font-variant-numeric:tabular-nums}
  .fd-inv tr.sub td{font-weight:700;border-top:1px solid #ccc;color:#0d0d0d}
  .fd-inv tr.fiscal td{color:#666}
  .fd-total{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding:18px 22px;background:#0d0d0d;border-radius:10px}
  .fd-total-label{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#c9a227}
  .fd-total-val{font-size:28px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums}
  @media print{
    body{background:#fff}
    .top,.tabs,.btn-row,.no-print{display:none!important}
    .view{display:none!important;padding:0}
    .view.active{display:block!important}
    .fr{border-radius:0}
    .fr-internal{display:none!important}
  }
  /* Modo impressão da Folha de Rosto: só o documento comercial limpo */
  body.printing-folha{background:#fff!important}
  body.printing-folha .top,
  body.printing-folha .tabs,
  body.printing-folha .layout > *:not(.main),
  body.printing-folha .side,
  body.printing-folha .no-print,
  body.printing-folha .no-print-folha{display:none!important}
  @media print{
    body.printing-folha .folha-doc{border:none;border-radius:0;padding:0;max-width:100%;break-inside:auto}
    body.printing-folha .fd-sec{break-inside:avoid;page-break-inside:avoid}
    body.printing-folha .fd-total{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    body.printing-folha button{display:none!important}
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<body>
<div class="app">

  <div class="top">
    <div class="brand">
      <div class="eyebrow">Stage Films</div>
      <input class="proj-name" id="projName" value="Ford Ranger Limited — 2 Diárias">
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span id="saveHint" style="font-size:10px;color:#444"></span>
      <button class="btn" style="padding:7px 14px;font-size:11px" onclick="salvarNoHistorico()">💾 Salvar no histórico</button>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <!-- VIEWS -->
  <div class="view" id="v-inicio"></div>
  <div class="view" id="v-dados"></div>
  <div class="view" id="v-rosto"></div>
  <div class="view" id="v-analise"></div>
  <div class="view" id="v-saude"></div>
  <div class="view" id="v-ajuste"></div>
  <div class="view" id="v-historico"></div>
</div>

function aplicarRegraDestino(it){
  switch(it.dest){
    case "Stage":      it.cs = 0; break;                    // cobra mas não paga terceiro
    case "Freela":     it.cs = it.cc; break;                // repassa ao freela
    case "Fornecedor": if(it.cs===undefined) it.cs = it.cc; break; // copia, mas editável
    case "Locação":    if(it.cs===undefined) it.cs = it.cc; break; // copia, mas editável
    case "Catering":   if(it.cs===undefined) it.cs = it.cc; break; // copia, mas editável
    case "Cortesia":   it.cc = 0; break;                    // não cobra, custo fica
    case "Incluso":    it.cc = 0; it.cs = 0; break;         // nada cobra, nada custa
    case "Reembolso":  it.cs = it.cc; break;                // repasse puro
  }
  return it;
}

const KEY="stage_orcamento_html_v1";
const HKEY="stage_orcamento_historico_v1";
let S = load();
function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw){return migrate(JSON.parse(raw));}
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULTS));
}
function migrate(st){
  // garante campos novos em dados antigos
  if(st.showPago===undefined) st.showPago=false;
  if(st.hideEmpty===undefined) st.hideEmpty=true;
  if(st.fiscal && st.fiscal.fecharEm===undefined) st.fiscal.fecharEm=0;
  if(st.cliente===undefined) st.cliente="";
  if(st.agencia===undefined) st.agencia="";
  if(st.versao===undefined) st.versao="";
  if(st.responsavel===undefined) st.responsavel="";
  if(st.dataOrc===undefined) st.dataOrc="";
  if(!st.rosto) st.rosto={resumo:"",escopo:"",entregaveis:"",cronograma:"",condecine:0};
  if(st.rosto.condecine===undefined) st.rosto.condecine=0;
  if(st.items){
    Object.keys(st.items).forEach(cat=>{
      (st.items[cat]||[]).forEach(it=>{
        // Migração para o modelo Custo Cliente / Custo Stage / Destino
        if(it.cc===undefined){
          // 'vi' (valor ideal) ou 'v' (cobrado) antigos viram Custo Cliente
          it.cc = (it.vi!==undefined?it.vi : (it.v!==undefined?it.v:0));
        }
        if(it.cs===undefined){
          // 'cp' (pago ao profissional) antigo vira Custo Stage; senão copia cc
          it.cs = (it.cp!==undefined?it.cp:it.cc);
        }
        if(it.dest===undefined) it.dest = "Freela";
        // limpa campos antigos
        delete it.v; delete it.vi; delete it.cp; delete it.c; delete it.ce; delete it.cr;
      });
    });
  }
  return st;
}

}

// Carrega do banco (ou local) e atualiza a tela
async function fetchHist(){
  if(cloudOn() && sb){
    try{
      const {data,error} = await sb.from('orcamentos').select('*').order('ts',{ascending:false});
      if(error) throw error;
      histCache = (data||[]).map(r=>({
        id:r.id, nome:r.nome, cliente:r.cliente, data:r.data, ts:r.ts,
        total:r.total, verba:r.verba, lucro:r.lucro, status:r.status, estado:r.estado
      }));
      histLoaded = true;
      saveHistLocal(histCache); // espelho local p/ offline
      if(activeTab==='historico') renderHistorico();
      return;
    }catch(e){
      lastCloudError = (e&&e.message) ? e.message : JSON.stringify(e);
      console.error("Falha ao buscar na nuvem, usando local:", lastCloudError);
    }
  }
  histCache = loadHistLocal();
  histLoaded = true;
  if(activeTab==='historico') renderHistorico();
}

// ── Duplicar categoria (ex: 2º dia de Técnica) ──
function duplicarCategoria(catId){
  const lista = cats();
  const orig = lista.find(c=>c.id===catId);
  if(!orig) return;
  // garante que S.cats existe (materializa a lista base na primeira duplicação)
  if(!S.cats || !S.cats.length){ S.cats = JSON.parse(JSON.stringify(CATS_BASE)); }
  const novoId = catId + "_" + Date.now().toString(36);
  // sugere um nome incrementando "Dia N" se o label tiver "Dia"
  let novoLabel = orig.label;
  const mDia = novoLabel.match(/Dia (\d+)/);
  if(mDia){ novoLabel = novoLabel.replace(/Dia \d+/, "Dia "+(parseInt(mDia[1])+1)); }
  else { novoLabel = novoLabel + " (cópia)"; }
  const novaCat = {id:novoId, label:novoLabel, icon:orig.icon};
  // insere logo após a original
  const idxOrig = S.cats.findIndex(c=>c.id===catId);
  S.cats.splice(idxOrig+1, 0, novaCat);
  // copia os itens da original (mantém valores, zera quantidades)
  const itensCopia = JSON.parse(JSON.stringify(S.items[catId]||[])).map(it=>({...it, q:0}));
  S.items[novoId] = itensCopia;
  S.openCats[novoId] = true;
  save();
  renderDados();
}

function renomearCategoria(catId){
  const lista = cats();
  const c = lista.find(x=>x.id===catId);
  if(!c) return;
  const novo = prompt("Novo nome para a categoria:", c.label);
  if(novo===null || !novo.trim()) return;
  if(!S.cats || !S.cats.length){ S.cats = JSON.parse(JSON.stringify(CATS_BASE)); }
  const target = S.cats.find(x=>x.id===catId);
  if(target){ target.label = novo.trim(); save(); renderDados(); }
}

function removerCategoria(catId){
  // só permite remover categorias duplicadas (não as base)
  if(CATS_BASE.find(c=>c.id===catId)){ alert("As categorias originais não podem ser removidas. Use 'Ocultar vazios' para limpar a visão."); return; }
  if(!confirm("Remover esta categoria duplicada e todos os seus itens?")) return;
  S.cats = (S.cats||[]).filter(c=>c.id!==catId);
  delete S.items[catId];
  save();
  renderDados();
}

// ── Drag & drop para reordenar itens dentro da categoria ──
let dragCat=null, dragIdx=null;
function dragStart(e,cat,idx){ dragCat=cat; dragIdx=idx; e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',idx);}catch(_){} }
function dragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; }
function dropRow(e,cat,idx){
  e.preventDefault();
  if(dragCat===null || dragCat!==cat || dragIdx===null || dragIdx===idx) return;
  const arr=S.items[cat];
  const [moved]=arr.splice(dragIdx,1);
  arr.splice(idx,0,moved);
  dragCat=null; dragIdx=null;
  save(); renderDados();
}
function dragEnd(e){ dragCat=null; dragIdx=null; }

};

function calc(){
  // ── BASE da aba DADOS (terminologia oficial dos PDFs) ──
  const receitaCliente = subtotalCliente();   // Receita do Cliente = soma dos Custo Cliente (o que cobramos)
  const custoReal      = custoStageTotal();    // Custo Real = soma dos Custo Stage (o que a Stage paga)
  const resultadoOper  = receitaCliente - custoReal; // Resultado Operacional = soma dos Resultados dos itens

  const t=S.fiscal.taxa/100, i=S.fiscal.imposto/100, d=S.fiscal.desconto/100;

  // ── Preço ao cliente: Receita + Taxa da Produtora + Impostos (− desconto) ──
  const taxaVal = receitaCliente*t;   // Taxa da Produtora (fee, sobre a receita)
  const impVal  = receitaCliente*i;   // Impostos / NF (repassado ao cliente)
  const descVal = receitaCliente*d;   // desconto comercial %
  const totalCalc = receitaCliente*(1+t+i-d); // Total a cobrar do cliente

  // ── Verba negociada (o que o cliente paga de fato) ──
  const verba = S.fiscal.verba>0 ? S.fiscal.verba : totalCalc;
  const gapVerba = verba - totalCalc;

  // ── CONCESSÃO COMERCIAL: quando a verba fica abaixo do total ideal, a diferença come o lucro ──
  // Total ideal aqui é o totalCalc (preço cheio). Se a verba for menor, a concessão é a diferença.
  const concessaoComercial = (verba < totalCalc) ? (totalCalc - verba) : 0;

  // ── LUCRO BRUTO e LÍQUIDO (fórmula oficial) ──
  // Lucro Bruto = Fee da Produtora + Resultado dos Itens
  const lucroBruto = taxaVal + resultadoOper;
  // Lucro Líquido = Lucro Bruto − Descontos/Concessões Comerciais
  const lucroLiquido = lucroBruto - descVal - concessaoComercial;

  // ── LUCRO REAL validado contra a verba (Lucro Real = Cobrado − Impostos − Custo Stage) ──
  // Usa o que de fato entra (verba), tira o imposto repassado e o custo real.
  const impSobreVerba = verba>0 ? (verba/(1+t)) * 0 + impVal : impVal; // imposto é repassado, calculado sobre a receita
  const lucroReal = verba - impVal - custoReal; // o que sobra de verdade na verba

  const margem = totalCalc>0 ? lucroLiquido/totalCalc : 0;

  // ── Para Ajuste de Escopo ──
  const custoMax = S.fiscal.verba>0 ? verba/(1+t+i) : receitaCliente;
  const corteR = Math.max(0, receitaCliente - custoMax);
  const corteP = receitaCliente>0 ? corteR/receitaCliente : 0;

  // ── Ponto de equilíbrio: a verba precisa cobrir Custo Real + Imposto ──
  const custoMaisImposto = custoReal + impVal;
  const lucroNaVerba = verba - custoMaisImposto;

  // ── aliases de compatibilidade (abas ainda não migradas usam estes nomes) ──
  const sub = receitaCliente, subPago = custoReal, subIdeal = receitaCliente;
  const totalIdeal = totalCalc;
  const lucroExtra = resultadoOper;
  const lucro = lucroLiquido;
  const folgaDisponivel = 0;
  const descontoVsIdeal = 0, descontoVsIdealP = 0;
  const taxaIdealVal = taxaVal, impIdealVal = impVal, lucroIdeal = lucroLiquido, margemIdeal = margem, lucroIdealExtra = resultadoOper;

  return {
    // novos (oficiais)
    receitaCliente, custoReal, resultadoOper, taxaVal, impVal, descVal,
    totalCalc, verba, gapVerba, concessaoComercial, lucroBruto, lucroLiquido, lucroReal, margem,
    custoMax, corteR, corteP, custoMaisImposto, lucroNaVerba, t, i, d,
    // aliases (compatibilidade temporária)
    sub, subPago, subIdeal, totalIdeal, lucroExtra, lucro, folgaDisponivel,
    descontoVsIdeal, descontoVsIdealP, taxaIdealVal, impIdealVal, lucroIdeal, margemIdeal, lucroIdealExtra
  };
}

function healthState(){
  const k=calc();
  const totalFinal = (S.fiscal.verba>0 ? S.fiscal.verba : k.totalCalc);
  const margemLiq = totalFinal>0 ? (k.lucroLiquido/totalFinal) : 0;
  const metaAbaixo = (S.fiscal.verba>0 && S.fiscal.verba < k.totalCalc*0.995);
  // Semáforo baseado APENAS na margem líquida (saúde financeira)
  let key, emoji, text, sub;
  if(k.lucroLiquido<=0 || margemLiq<0.10){
    key="red"; emoji="🔴"; text="RISCO — MARGEM INSUFICIENTE";
    sub="O Lucro Líquido da Stage está comprometido. Reveja escopo, custos ou concessões antes de aprovar.";
  } else if(margemLiq<0.20){
    key="yellow"; emoji="🟡"; text="APERTADO — MARGEM BAIXA";
    sub="O projeto é lucrativo, mas com pouca folga. Qualquer imprevisto pode comprometer o resultado.";
  } else {
    key="green"; emoji="🟢"; text="SAUDÁVEL — LUCRO PRESERVADO";
    sub="O Lucro Líquido da Stage está preservado. Projeto lucrativo com margem confortável.";
  }
  // Alerta comercial complementar (meta vs ideal) — NÃO muda a cor
  let alerta = null;
  if(metaAbaixo){
    const diffPct = ((k.totalCalc - S.fiscal.verba)/k.totalCalc*100).toFixed(1);
    alerta = {tipo:"concessao", texto:`A Meta de Faturamento está ${diffPct}% abaixo do Total Ideal. Houve concessão comercial de ${fmt(k.concessaoComercial)}.`};
  }
  return {key, emoji, text, sub, alerta, margemLiq};
}

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap">
      <div class="panel-title" style="margin:0">Itens do orçamento — preencha Qtd, Custo Cliente, Custo Stage e Destino.</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" style="padding:6px 12px;font-size:10px" onclick="comecarDaTabelaModelo()" title="Carrega a lista completa com valores de tabela e zera as quantidades">↻ Tabela-modelo limpa</button>
        <button class="btn btn-ghost" style="padding:6px 12px;font-size:10px" onclick="toggleEmpty()">${S.hideEmpty?'👁 Mostrar todos os itens':'⊟ Ocultar vazios'}</button>
      </div>
    </div>
    ${catsHtml}
  </div>

  <div class="panel">
    <div class="panel-title">Configuração fiscal</div>
    <div class="cfg-grid">
      <div class="cfg-field"><label>Meta de Faturamento <span class="hint">(R$ — valor negociado/aprovado · 0 = usar total ideal)</span></label><input type="number" value="${f.verba}" oninput="updFiscal('verba',this.value)"></div>
      <div class="cfg-field"><label>Fee da Produtora <span class="hint">(% sobre Receita Cliente)</span></label><input type="number" value="${f.taxa}" oninput="updFiscal('taxa',this.value)"></div>
      <div class="cfg-field"><label>Impostos / NF <span class="hint">(% sobre faturamento)</span></label><input type="number" value="${f.imposto}" oninput="updFiscal('imposto',this.value)"></div>
      <div class="cfg-field"><label>Desconto <span class="hint">(% — calculado ou manual)</span></label><input type="number" step="0.01" value="${Math.round((f.desconto||0)*100)/100}" oninput="updFiscal('desconto',this.value)"></div>
      <div class="cfg-field"><label>Fechar em <span class="hint">(R$ — arredonda o total; deixe 0 pra não usar)</span></label><input type="number" placeholder="Arredondar total para…" oninput="fecharEmValor(this.value)"></div>
    </div>
  </div>

  <div class="panel" id="resultPanel">${resultPanelHTML()}</div>`;
}

function resultPanelHTML(){
  const k=calc(), f=S.fiscal;
  const temFolga = k.gapVerba > 0.5;
  const temFalta = k.gapVerba < -0.5;
  const usaVerba = f.verba>0;
  // [10] nenhum item ativo
  if(!temItemAtivo()){
    return `<div class="panel-title">Resultado</div>
      <div style="padding:28px 18px;text-align:center;color:var(--txt-dim);line-height:1.7">
        <div style="font-size:24px;margin-bottom:8px;opacity:.4">○</div>
        <div style="font-size:13px;color:var(--txt)">Nenhum item ativo no orçamento.</div>
        <div style="font-size:11px;margin-top:6px">Defina quantidade maior que zero para iniciar os cálculos.</div>
      </div>`;
  }
  // Total Final = a verba quando existir, senão o total ideal
  const totalFinal = usaVerba ? f.verba : k.totalCalc;

  return `<div class="panel-title">Resultado</div>

    <div style="background:#ffffff;border:1px solid var(--line);border:1px solid var(--line);border-radius:8px;padding:14px 16px;margin:10px 0">
      <div style="font-size:10px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Total Ideal a Cobrar</div>
      <div style="font-size:26px;font-weight:700;font-family:'DM Sans',sans-serif;color:var(--gold)">${fmt(k.totalCalc)}</div>
      ${usaVerba?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line)">
        <div style="font-size:10px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Meta de Faturamento / Total Final</div>
        <div style="font-size:22px;font-weight:700;font-family:'DM Sans',sans-serif;color:${temFalta?'#e0a85e':'var(--green)'}">${fmt(totalFinal)}</div>
        <div style="font-size:10px;color:var(--txt-dim);margin-top:3px">${temFolga?'Folga de '+fmt(k.gapVerba)+' — dá pra cobrar mais':temFalta?'Abaixo do ideal em '+fmt(-k.gapVerba)+' — o lucro usa este cenário':'Bateu certinho no ideal'}</div>
      </div>`:''}
    </div>

    <div class="res-row"><span class="rlabel">Receita do Cliente (itens)</span><span class="rval">${fmt(k.receitaCliente)}</span></div>
    <div class="res-row"><span class="rlabel sub">↳ Fee da Produtora (${f.taxa}%)</span><span class="rval" style="color:var(--green)">${fmt(k.taxaVal)}</span></div>
    <div class="res-row"><span class="rlabel sub">↳ Impostos / NF (${f.imposto}%) — repassado</span><span class="rval">${fmt(k.impVal)}</span></div>
    ${f.desconto>0?`<div class="res-row"><span class="rlabel sub">↳ Desconto (${f.desconto}%)</span><span class="rval v-red">−${fmt(k.descVal)}</span></div>`:''}
    <div class="res-row"><span class="rlabel">Custo Real (Stage paga)</span><span class="rval" style="color:#e0a85e">${fmt(k.custoReal)}</span></div>
    <div class="res-row"><span class="rlabel">Resultado dos Itens</span><span class="rval ${k.resultadoOper>0?'v-green':k.resultadoOper<0?'v-red':''}">${fmt(k.resultadoOper)}</span></div>

    ${(() => {
      const temConcessao = f.desconto>0 || k.concessaoComercial>0.5;
      // Card principal: Lucro Bruto (ou Lucro Líquido quando há concessão impactando)
      return `
    <div class="res-big lucro" style="border-color:${k.lucroBruto>0?'#90c0a0':'#d09090'}"><div class="rb-label">Lucro Bruto Stage</div><div class="rb-val ${k.lucroBruto>0?'v-green':'v-red'}">${fmt(k.lucroBruto)}</div></div>

    <div style="margin-top:10px;padding:12px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;font-size:11px;line-height:1.9">
      <div style="color:var(--txt-dim);text-transform:uppercase;letter-spacing:.06em;font-size:9px;margin-bottom:6px">Composição do lucro</div>
      <div style="display:flex;justify-content:space-between"><span>Fee da Produtora</span><span style="color:var(--green)">${fmt(k.taxaVal)}</span></div>
      <div style="display:flex;justify-content:space-between"><span>Resultado dos Itens</span><span class="${k.resultadoOper>0?'v-green':k.resultadoOper<0?'v-red':''}">${k.resultadoOper>=0?'+':''}${fmt(k.resultadoOper)}</span></div>
      <div style="display:flex;justify-content:space-between;border-top:1px solid var(--line);margin-top:6px;padding-top:6px;font-weight:600"><span>Lucro Bruto Stage</span><span class="${k.lucroBruto>0?'v-green':'v-red'}">${fmt(k.lucroBruto)}</span></div>
      ${temConcessao?`
        ${f.desconto>0?`<div style="display:flex;justify-content:space-between;margin-top:4px"><span>Desconto concedido</span><span class="v-red">−${fmt(k.descVal)}</span></div>`:''}
        ${k.concessaoComercial>0.5?`<div style="display:flex;justify-content:space-between"><span>Concessões comerciais</span><span class="v-red">−${fmt(k.concessaoComercial)}</span></div>`:''}
        <div style="display:flex;justify-content:space-between;border-top:1px solid var(--gold);margin-top:6px;padding-top:6px;font-weight:700"><span style="color:var(--gold)">Lucro Líquido Stage</span><span class="${k.lucroLiquido>0?'v-green':'v-red'}" style="font-weight:700">${fmt(k.lucroLiquido)}</span></div>
      `:''}
    </div>`;
    })()}

    ${usaVerba && k.gapVerba>0.5 ? `
    <div style="margin-top:16px">
      ${!simAjuste ? `
      <button class="btn" onclick="simularAjusteVerba()" style="width:100%;background:var(--gold);color:#0d0d0d;border:none;padding:11px;border-radius:8px;font-weight:600;font-size:12px;cursor:pointer">⚡ Ajustar valores até a meta (${fmt(f.verba)})</button>
      <div style="margin-top:8px;font-size:10px;color:var(--txt-dim);line-height:1.5">A Meta de Faturamento é maior que o total ideal. Isso ajusta o que você cobra do cliente (o preço de venda), mantendo o Custo Stage fixo, até bater na meta — a diferença vira resultado. Você confere antes de aplicar.</div>
      ` : `
      <div style="padding:16px;background:#fdf6e3;border:1px solid var(--gold);border-radius:8px">
        <div style="font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:600">⚡ Simulação — ajuste até a meta</div>
        <div style="display:grid;grid-template-columns:1fr auto auto;gap:8px 14px;align-items:center;font-size:11px;margin-bottom:4px">
          <span></span><span style="color:var(--txt-dim);font-size:9px;text-transform:uppercase;text-align:right">Atual</span><span style="color:var(--gold);font-size:9px;text-transform:uppercase;text-align:right">Projetado</span>
          <span class="rlabel">Total a cobrar</span><span style="text-align:right">${fmt(simAjuste.totalAntigo)}</span><span style="text-align:right;color:var(--gold);font-weight:600">${fmt(simAjuste.novoTotal)}</span>
          <span class="rlabel" style="color:var(--green)">Lucro Bruto</span><span style="text-align:right" class="v-green">${fmt(simAjuste.lucroAntigo)}</span><span style="text-align:right;font-weight:700" class="v-green">${fmt(simAjuste.novoLucro)}</span>
        </div>
        <div class="res-row" style="border:none;padding:5px 0"><span class="rlabel">Cada valor cobrado muda em</span><span class="rval ${simAjuste.fator>=1?'v-green':'v-red'}">${simAjuste.fator>=1?'+':''}${pct(simAjuste.fator-1)}</span></div>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="btn" onclick="aplicarAjusteVerba()" style="flex:1;background:var(--green);color:#0d0d0d;border:none;padding:10px;border-radius:6px;font-weight:600;font-size:12px;cursor:pointer">✓ Aplicar nos itens</button>
          <button class="btn btn-ghost" onclick="cancelarAjusteVerba()" style="flex:1;padding:10px;border-radius:6px;font-size:12px;cursor:pointer">Cancelar</button>
        </div>
      </div>
      `}
    </div>
    ` : usaVerba && k.gapVerba < -0.5 ? `
    <div style="margin-top:16px;padding:14px 16px;background:#fdf0ef;border:1px solid #d09090;border-radius:8px">
      <div style="font-size:11px;color:#e06a5e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-weight:600">⚠ Meta abaixo do ideal</div>
      <div style="font-size:11px;color:#8a3030;line-height:1.6">O total ideal (${fmt(k.totalCalc)}) está <b>${fmt(-k.gapVerba)} acima</b> da verba (${fmt(f.verba)}). Essa diferença vira concessão comercial e reduz o lucro. Reveja o escopo na aba <b>Ajuste de Escopo</b> se quiser proteger a margem.</div>
    </div>` : ''}`;
}

function esc(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

/* ============ RENDER: FOLHA DE ROSTO ============ */
function renderRosto(){
  const k=calc(), f=S.fiscal, r=S.rosto||{};
  // Investimento por fase
  const fPre=faseCliente('pre'), fProd=faseCliente('prod'), fPos=faseCliente('pos');
  const taxaImp = ceil5(k.taxaVal + k.impVal);
  const condecine = num(r.condecine)||0;
  const totalBase = k.receitaCliente + taxaImp + condecine;
  let descontoVal = 0, totalFinal = totalBase;
  if(f.fecharEm>0){ totalFinal = f.fecharEm; descontoVal = totalBase - totalFinal; }
  else if(f.desconto>0){ descontoVal = k.receitaCliente*(f.desconto/100); totalFinal = totalBase - descontoVal; }

  // ── PARTE ADMIN (editável, só na tela) ──
  const campo = (label,field,val,ph)=>`<div style="margin-bottom:2px"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);margin-bottom:3px">${label}</div><input class="rosto-inp" value="${esc(val||'')}" oninput="updProj('${field}',this.value)" placeholder="${ph}"></div>`;
  const area = (label,field,val,ph,rows)=>`<div><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);margin-bottom:4px">${label}</div><textarea class="rosto-area" rows="${rows||5}" oninput="updRosto('${field}',this.value)" placeholder="${ph}">${esc(val||'')}</textarea></div>`;

  const adminHTML = `
    <div class="rosto-bloco no-print-folha">
      <div class="rosto-h">1 · Dados do Projeto</div>
      <div class="rosto-grid">
        ${campo('Projeto','projName',S.projName,'Nome do projeto')}
        ${campo('Cliente','cliente',S.cliente,'Nome do cliente')}
        ${campo('Agência','agencia',S.agencia,'Agência (se houver)')}
        ${campo('Data do orçamento','dataOrc',S.dataOrc,'00/00/0000')}
        ${campo('Versão','versao',S.versao,'v1')}
        ${campo('Contato Responsável','responsavel',S.responsavel,'Pedro Braga · Stage Films')}
      </div>
    </div>
    <div class="rosto-bloco no-print-folha">
      <div class="rosto-h">2 · Resumo Executivo</div>
      ${area('Descreva o projeto em poucas linhas','resumo',r.resumo,'Ex: Produção audiovisual de lançamento da Ford Ranger Limited. Captação em 2 diárias, incluindo equipe técnica, equipamentos, logística, pós-produção e entregáveis digitais.',5)}
    </div>
    <div class="rosto-bloco no-print-folha">
      <div class="rosto-h">3 · Escopo</div>
      ${area('O que está incluído (um item por linha)','escopo',r.escopo,'✓ Pré-produção\n✓ 2 diárias de filmagem\n✓ Equipe técnica completa\n✓ Drone\n✓ Pós-produção\n✓ Entrega final',8)}
    </div>
    <div class="rosto-bloco no-print-folha">
      <div class="rosto-h">4 · Entregáveis</div>
      ${area('O que o cliente recebe (um por linha)','entregaveis',r.entregaveis,'01 Filme Hero\n03 Cutdowns\n05 Reels\n01 Versão LinkedIn\nFrames para thumb',6)}
    </div>
    <div class="rosto-bloco no-print-folha">
      <div class="rosto-h">5 · Cronograma</div>
      ${area('Fases e datas','cronograma',r.cronograma,'Pré-Produção — 10 a 15/06\nCaptação — 20 e 21/06\nEntrega primeira versão — 28/06\nEntrega final — 05/07',6)}
    </div>
    <div class="rosto-bloco no-print-folha">
      <div class="rosto-h">6 · Investimento <span style="font-weight:400;font-size:10px;color:var(--txt-dim);text-transform:none;letter-spacing:0">(automático — vem da aba Dados)</span></div>
      <button class="mini-edit" onclick="editCondecine()" style="font-size:11px;color:var(--txt-dim)">✎ Taxa Condecine: ${condecine>0?fmt(condecine):'não aplicada'}</button>
      <div style="font-size:10px;color:var(--txt-dim);margin-top:8px;line-height:1.5">Os valores de Pré/Produção/Pós vêm da aba Dados. Para fechar num valor redondo, use "Fechar em" na Configuração Fiscal.</div>
    </div>`;

  // ── PARTE PDF (só conteúdo preenchido) ──
  // helper: transforma texto em linhas <div>, ignorando vazias
  const linhas = (txt)=> (txt||'').split('\n').map(l=>l.trim()).filter(l=>l).map(l=>`<div style="padding:2px 0">${esc(l)}</div>`).join('');
  const temTexto = (txt)=> (txt||'').trim().length>0;

  // Fases com valor (>0)
  const fasesInv = [
    ['Pré-Produção', fPre],
    ['Produção', fProd],
    ['Pós-Produção', fPos]
  ].filter(x=>x[1]>0.5);

  const pdfHTML = `
    <div class="folha-doc">
      <!-- Cabeçalho do documento -->
      <div class="fd-head">
        <div class="fd-title">${esc(S.projName||'Proposta de Produção')}</div>
        <div class="fd-meta">
          ${S.cliente?`<span><b>Cliente:</b> ${esc(S.cliente)}</span>`:''}
          ${S.agencia?`<span><b>Agência:</b> ${esc(S.agencia)}</span>`:''}
          ${S.dataOrc?`<span><b>Data:</b> ${esc(S.dataOrc)}</span>`:''}
          ${S.versao?`<span><b>Versão:</b> ${esc(S.versao)}</span>`:''}
          ${S.responsavel?`<span><b>Contato:</b> ${esc(S.responsavel)}</span>`:''}
        </div>
      </div>

      ${temTexto(r.resumo)?`<div class="fd-sec"><div class="fd-h">Resumo Executivo</div><div class="fd-body">${linhas(r.resumo)}</div></div>`:''}
      ${temTexto(r.escopo)?`<div class="fd-sec"><div class="fd-h">Escopo</div><div class="fd-body">${linhas(r.escopo)}</div></div>`:''}
      ${temTexto(r.entregaveis)?`<div class="fd-sec"><div class="fd-h">Entregáveis</div><div class="fd-body">${linhas(r.entregaveis)}</div></div>`:''}
      ${temTexto(r.cronograma)?`<div class="fd-sec"><div class="fd-h">Cronograma</div><div class="fd-body">${linhas(r.cronograma)}</div></div>`:''}

      <div class="fd-sec">
        <div class="fd-h">Investimento</div>
        <table class="fd-inv">
          ${fasesInv.map(x=>`<tr><td>${x[0]}</td><td class="r">${fmt(x[1])}</td></tr>`).join('')}
          <tr class="sub"><td>Subtotal do Projeto</td><td class="r">${fmt(k.receitaCliente)}</td></tr>
          <tr class="fiscal"><td>Fee da Produtora + Impostos</td><td class="r">${fmt(taxaImp)}</td></tr>
          ${condecine>0.5?`<tr class="fiscal"><td>Taxa Condecine</td><td class="r">${fmt(condecine)}</td></tr>`:''}
          ${descontoVal>0.5?`<tr class="fiscal"><td>Desconto negociado</td><td class="r" style="color:#b00">−${fmt(descontoVal)}</td></tr>`:''}
        </table>
        <div class="fd-total">
          <div class="fd-total-label">Investimento Total</div>
          <div class="fd-total-val">${fmt(totalFinal)}</div>
        </div>
      </div>
    </div>`;

  document.getElementById('v-rosto').innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap" class="no-print-folha">
    <div class="panel-title" style="margin:0">Folha de Rosto — proposta para o cliente</div>
    <button class="btn" onclick="gerarPDF()" style="background:var(--gold);color:#0d0d0d;border:none;padding:9px 18px;border-radius:8px;font-weight:600;font-size:12px;cursor:pointer">⬇ Gerar PDF para cliente</button>
  </div>
  <div style="font-size:11px;color:var(--txt-dim);margin-bottom:16px;line-height:1.5" class="no-print-folha">Preencha os campos abaixo. <b>Seções vazias não aparecem no PDF.</b> O Investimento é automático, vindo da aba Dados.</div>
  ${adminHTML}
  <div style="border-top:1px dashed var(--line);margin:24px 0 16px" class="no-print-folha"></div>
  <div style="font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px" class="no-print-folha">↓ Prévia do PDF (o que o cliente vê)</div>
  ${pdfHTML}`;
}

/* ============ RENDER: ANÁLISE DE CUSTOS ============ */
function renderAnalise(){
  const k=calc(), f=S.fiscal;
  const temConcessao = k.concessaoComercial>0.5 || f.desconto>0;

  // Tabela por categoria: Cobrado (Custo Cliente) | Custo Real (Stage) | Resultado
  const rowsCat = cats().map(c=>{
    const cli=catCliente(c.id), stg=catStage(c.id), res=cli-stg;
    if(cli===0 && stg===0) return '';
    const cls = res>0?'v-green':res<0?'v-red':'';
    return `<tr><td>${c.icon} ${c.label}</td><td style="text-align:right">${fmt(cli)}</td><td style="text-align:right">${fmt(stg)}</td><td style="text-align:right;font-weight:600" class="${cls}">${res>=0?'+':''}${fmt(res)}</td></tr>`;
  }).join('');

  // Distribuição: percentual por fase
  const fPre=faseCliente('pre'), fProd=faseCliente('prod'), fPos=faseCliente('pos');
  const distRows = [['Pré-Produção',fPre],['Produção',fProd],['Pós-Produção',fPos]]
    .filter(x=>x[1]>0.5)
    .map(x=>{
      const p=k.receitaCliente>0?(x[1]/k.receitaCliente*100).toFixed(1):'0';
      return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="width:120px;font-size:12px">${x[0]}</span><div style="flex:1;background:#1a1a1a;border-radius:4px;height:18px;overflow:hidden"><div style="width:${p}%;height:100%;background:var(--gold);border-radius:4px;transition:width .3s"></div></div><span style="font-size:11px;color:var(--txt-dim);width:50px;text-align:right">${p}%</span></div>`;
    }).join('');

  // Resultado percentual
  const totalFinalAn = (f.verba>0?f.verba:k.totalCalc); const resPct = totalFinalAn>0 ? (k.lucroBruto/totalFinalAn*100).toFixed(1) : '0';
  const resLiqPct = totalFinalAn>0 ? (k.lucroLiquido/totalFinalAn*100).toFixed(1) : '0';

  document.getElementById('v-analise').innerHTML=`
  <div class="panel">
    <div class="panel-title">Análise de Custos</div>

    <!-- TABELA POR CATEGORIA -->
    <div style="margin-bottom:20px">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--txt-dim);margin-bottom:10px">Receita × Custo Real × Resultado por categoria</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <tr style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--txt-dim)"><th style="text-align:left;padding:6px 4px">Categoria</th><th style="text-align:right;padding:6px 4px">Receita Cliente</th><th style="text-align:right;padding:6px 4px">Custo Real</th><th style="text-align:right;padding:6px 4px">Resultado</th></tr>
        ${rowsCat}
        <tr style="border-top:2px solid var(--line);font-weight:700"><td style="padding:10px 4px">TOTAL</td><td style="text-align:right;padding:10px 4px">${fmt(k.receitaCliente)}</td><td style="text-align:right;padding:10px 4px;color:#e0a85e">${fmt(k.custoReal)}</td><td style="text-align:right;padding:10px 4px" class="${k.resultadoOper>0?'v-green':k.resultadoOper<0?'v-red':''}">${k.resultadoOper>=0?'+':''}${fmt(k.resultadoOper)}</td></tr>
      </table>
    </div>

    <!-- DISTRIBUIÇÃO DO ORÇAMENTO -->
    ${distRows?`
    <div style="margin-bottom:24px">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--txt-dim);margin-bottom:12px">Distribuição do Orçamento</div>
      ${distRows}
    </div>`:''}

    <!-- CARD PRINCIPAL: RESULTADO FINAL -->
    <div style="background:#ffffff;border:1px solid var(--line);border:2px solid ${k.lucroBruto>0?'#2a5c34':'#5c2620'};border-radius:12px;padding:22px 24px;text-align:center;margin-bottom:18px">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt-dim);margin-bottom:6px">${temConcessao?'Lucro Líquido da Stage':'Lucro Bruto Stage'}</div>
      <div style="font-size:36px;font-weight:800;font-family:'DM Sans',sans-serif" class="${(temConcessao?k.lucroLiquido:k.lucroBruto)>0?'v-green':'v-red'}">${fmt(temConcessao?k.lucroLiquido:k.lucroBruto)}</div>
      <div style="font-size:14px;color:var(--txt-dim);margin-top:4px">Margem líquida: ${temConcessao?resLiqPct:resPct}%</div>
    </div>

    <!-- COMPOSIÇÃO DO RESULTADO -->
    <div style="padding:16px 18px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;font-size:12px;line-height:2">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);margin-bottom:8px">Composição do resultado</div>
      <div style="display:flex;justify-content:space-between"><span>Fee da Produtora (${f.taxa}%)</span><span style="color:var(--green)">${fmt(k.taxaVal)}</span></div>
      <div style="display:flex;justify-content:space-between"><span>Resultado dos Itens</span><span class="${k.resultadoOper>0?'v-green':k.resultadoOper<0?'v-red':''}">${k.resultadoOper>=0?'+':''}${fmt(k.resultadoOper)}</span></div>
      <div style="display:flex;justify-content:space-between;border-top:1px solid var(--line);margin-top:6px;padding-top:6px;font-weight:700"><span>Lucro Bruto Stage</span><span class="${k.lucroBruto>0?'v-green':'v-red'}">${fmt(k.lucroBruto)}</span></div>
      ${temConcessao?`
        ${f.desconto>0?`<div style="display:flex;justify-content:space-between;margin-top:6px"><span>Desconto concedido</span><span class="v-red">−${fmt(k.descVal)}</span></div>`:''}
        ${k.concessaoComercial>0.5?`<div style="display:flex;justify-content:space-between"><span>Concessão comercial</span><span class="v-red">−${fmt(k.concessaoComercial)}</span></div>`:''}
        <div style="display:flex;justify-content:space-between;border-top:1px solid var(--gold);margin-top:6px;padding-top:6px;font-weight:700"><span style="color:var(--gold)">Lucro Líquido Stage</span><span class="${k.lucroLiquido>0?'v-green':'v-red'}" style="font-weight:700">${fmt(k.lucroLiquido)}</span></div>
      `:''}
    </div>
  </div>`;
}

/* ============ RENDER: SAÚDE ============ */
function renderSaude(){
  const k=calc(), f=S.fiscal, h=healthState();
  const fatReal = (f.verba>0 ? f.verba : k.totalCalc); const margemLiq = fatReal>0 ? k.lucroLiquido/fatReal : 0;
  const margemLiqPct = (margemLiq*100).toFixed(1);
  const usaMeta = f.verba>0;
  const totalFinal = usaMeta ? f.verba : k.totalCalc;
  const diffIdeal = totalFinal - k.totalCalc;
  const pctIdeal = k.totalCalc>0 ? (totalFinal/k.totalCalc*100).toFixed(1) : '0';

  // Faixa da margem (ponto 13)
  let faixaLabel='', faixaCor='';
  if(margemLiq>=0.30){ faixaLabel='Muito saudável'; faixaCor='var(--green)'; }
  else if(margemLiq>=0.20){ faixaLabel='Saudável'; faixaCor='var(--green)'; }
  else if(margemLiq>=0.10){ faixaLabel='Apertado'; faixaCor='#e0a85e'; }
  else{ faixaLabel='Risco'; faixaCor='var(--red)'; }

  // Texto da meta vs ideal (ponto 8)
  let metaTexto = '';
  if(usaMeta){
    if(diffIdeal > k.totalCalc*0.005) metaTexto = `Sua Meta de Faturamento está <b>${(diffIdeal/k.totalCalc*100).toFixed(1)}% acima</b> do Total Ideal. Há margem de segurança no orçamento.`;
    else if(diffIdeal < -k.totalCalc*0.005){
      const pctAbaixo = (-diffIdeal/k.totalCalc*100).toFixed(1);
      const saudavel = h.key==='green';
      metaTexto = saudavel
        ? `Sua Meta de Faturamento está <b>${pctAbaixo}% abaixo</b> do Total Ideal. O projeto continua saudável e lucrativo, mas houve concessão comercial de <b>${fmt(k.concessaoComercial)}</b>.`
        : `Sua Meta de Faturamento está <b>${pctAbaixo}% abaixo</b> do Total Ideal. Revise escopo, custos ou concessões para proteger a margem.`;
    }
    else metaTexto = `Sua Meta de Faturamento está próxima do Total Ideal. O orçamento está equilibrado, com pouca folga para concessões.`;
  }

  // Cenário ideal diferente do atual? (ponto 11)
  const temDiffIdeal = usaMeta && Math.abs(diffIdeal) > 0.5;

  document.getElementById('v-saude').innerHTML=`
  <div class="panel">
    <div class="panel-title">Saúde do Projeto</div>

    <!-- 1. STATUS GERAL (baseado na margem líquida) -->
    <div class="status ${h.key}" style="margin-bottom:${h.alerta?'10':'20'}px">
      <div class="s-emoji">${h.emoji}</div>
      <div class="s-text">${h.text}</div>
      <div class="s-sub">${h.sub}</div>
    </div>
    ${h.alerta?`<div style="padding:10px 14px;margin-bottom:20px;background:#fdf6e3;border:1px solid #d4c080;border-radius:8px;font-size:11px;line-height:1.5;color:#8a6d10">⚠ <b>Concessão comercial:</b> ${h.alerta.texto}</div>`:''}


    <!-- 2. META vs TOTAL IDEAL -->
    ${usaMeta?`
    <div style="background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:18px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);margin-bottom:3px">Meta de Faturamento</div><div style="font-size:18px;font-weight:700">${fmt(f.verba)}</div></div>
        <div><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);margin-bottom:3px">Total Ideal</div><div style="font-size:18px;font-weight:700">${fmt(k.totalCalc)}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);margin-bottom:3px">Concessão Comercial</div><div style="font-size:14px;font-weight:600" class="${diffIdeal>0?'v-green':diffIdeal<0?'v-red':''}">${diffIdeal>=0?'+':''}${fmt(diffIdeal)}</div></div>
        <div><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);margin-bottom:3px">Meta cobre</div><div style="font-size:14px;font-weight:600">${pctIdeal}% do Ideal</div></div>
      </div>
      ${metaTexto?`<div style="font-size:11px;color:var(--txt-dim);margin-top:12px;line-height:1.5;border-top:1px solid var(--line);padding-top:10px">${metaTexto}</div>`:''}
    </div>`:''}

    <!-- 3. LUCRO LÍQUIDO + 4. MARGEM LÍQUIDA -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px">
      <div style="background:#ffffff;border:1px solid var(--line);border:2px solid ${k.lucroLiquido>0?'#90c0a0':'#d09090'};border-radius:12px;padding:18px;text-align:center">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt-dim);margin-bottom:4px">Lucro Líquido Stage</div>
        <div style="font-size:26px;font-weight:800;font-family:'DM Sans',sans-serif" class="${k.lucroLiquido>0?'v-green':'v-red'}">${fmt(k.lucroLiquido)}</div>
      </div>
      <div style="background:#ffffff;border:1px solid var(--line);border:2px solid ${margemLiq>=0.20?'#90c0a0':margemLiq>=0.10?'#d4c080':'#d09090'};border-radius:12px;padding:18px;text-align:center">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt-dim);margin-bottom:4px">Margem Líquida</div>
        <div style="font-size:26px;font-weight:800;font-family:'DM Sans',sans-serif;color:${faixaCor}">${margemLiqPct}%</div>
        <div style="font-size:10px;color:var(--txt-dim);margin-top:2px">${faixaLabel}</div>
      </div>
    </div>

    <!-- BARRA DE MARGEM (visual) -->
    <div style="margin-bottom:22px">
      <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--txt-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em"><span>0%</span><span>10%</span><span>20%</span><span>30%+</span></div>
      <div style="background:#e5e0d8;border-radius:6px;height:10px;position:relative;overflow:hidden">
        <div style="position:absolute;left:0;top:0;height:100%;width:${Math.min(100,margemLiq*100/0.35)}%;background:linear-gradient(90deg,#5c2620 0%,#5c5020 28%,#2a5c34 57%,#1a8a3a 100%);border-radius:6px;transition:width .3s"></div>
        <div style="position:absolute;left:${Math.min(98,margemLiq*100/0.35)}%;top:-1px;width:3px;height:12px;background:#fff;border-radius:1px"></div>
      </div>
      <div style="display:flex;font-size:9px;color:var(--txt-dim);margin-top:3px"><span style="width:28%">Risco</span><span style="width:29%">Apertado</span><span style="width:29%">Saudável</span><span>Muito saudável</span></div>
    </div>

    <!-- 5. RESUMO -->
    <div style="padding:14px 16px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;font-size:12px;line-height:2">
      <div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);margin-bottom:6px">Resumo</div>
      <div style="display:flex;justify-content:space-between"><span>Fee da Produtora</span><span>${fmt(k.taxaVal)}</span></div>
      <div style="display:flex;justify-content:space-between"><span>Resultado dos Itens</span><span class="${k.resultadoOper>=0?'v-green':'v-red'}">${k.resultadoOper>=0?'+':''}${fmt(k.resultadoOper)}</span></div>
      ${k.descVal>0.5?`<div style="display:flex;justify-content:space-between"><span>Desconto concedido</span><span class="v-red">−${fmt(k.descVal)}</span></div>`:''}
      ${k.concessaoComercial>0.5?`<div style="display:flex;justify-content:space-between"><span>Concessão comercial</span><span class="v-red">−${fmt(k.concessaoComercial)}</span></div>`:''}
      <div style="display:flex;justify-content:space-between;border-top:1px solid var(--line);margin-top:4px;padding-top:6px;font-weight:700"><span>Lucro Líquido Stage</span><span class="${k.lucroLiquido>0?'v-green':'v-red'}">${fmt(k.lucroLiquido)}</span></div>
      <div style="display:flex;justify-content:space-between"><span>Margem Líquida</span><span style="font-weight:600;color:${faixaCor}">${margemLiqPct}%</span></div>
    </div>
  </div>`;
}

/* ============ RENDER: AJUSTE DE ESCOPO ============ */
function renderAjuste(){
  const k=calc(), f=S.fiscal;
  const cortadoProd = -S.ajustes.reduce((s,a)=>s+(num(a.va)-num(a.vo)),0); // positivo = corte
  const modoCorte = k.gapVerba < -0.5;
  const modoSubida = k.gapVerba > 0.5;
  const metaCorte = k.corteR; // quanto cortar na produção pra fechar
  const gap = Math.abs(k.gapVerba);

  // Impacto em cascata: corte na produção reduz fee e imposto
  const feeReduz = metaCorte * k.t;
  const impReduz = metaCorte * k.i;
  const impactoTotal = metaCorte + feeReduz + impReduz;

  // Status de fechamento
  const fechou = modoCorte && cortadoProd >= metaCorte - 0.5;
  const falta = modoCorte ? Math.max(0, metaCorte - cortadoProd) : 0;

  // Tabela de ajustes
  const rows = S.ajustes.map((a,idx)=>{
    const corte = num(a.vo) - num(a.va);
    const cls = corte>0?'v-yellow':corte<0?'v-green':'';
    return `<tr>
      <td style="width:110px"><input class="txt" value="${esc(a.cat)}" oninput="updAj(${idx},'cat',this.value)" placeholder="Categoria"></td>
      <td><input class="txt" value="${esc(a.item)}" oninput="updAj(${idx},'item',this.value)" placeholder="Ex: Drone FPV"></td>
      <td><input class="txt" value="${esc(a.obs||'')}" oninput="updAj(${idx},'obs',this.value)" placeholder="Ex: Removido por restrição de verba"></td>
      <td style="width:90px"><input type="number" class="money" value="${a.vo}" oninput="updAj(${idx},'vo',this.value)"></td>
      <td style="width:90px"><input type="number" class="money" value="${a.va}" oninput="updAj(${idx},'va',this.value)"></td>
      <td style="width:90px;text-align:right;font-weight:600" class="${cls}">${corte>0?'-':''}${fmt(Math.abs(corte))}</td>
      <td style="width:100px;text-align:right;font-size:11px;color:var(--txt-dim)" title="Corte + redução automática de Fee e Impostos">${corte>0?'-'+fmt(corte*(1+k.t+k.i)):'—'}</td>
      <td style="width:24px"><button class="del" onclick="delAj(${idx})">✕</button></td>
    </tr>`;
  }).join('');

  // Texto comercial automático (ponto 6)
  const itensComCorte = S.ajustes.filter(a=>a.item && num(a.vo)!==num(a.va));
  let textoCliente = '';
  if(itensComCorte.length>0){
    textoCliente = `Para adequar o projeto à verba aprovada de ${fmt(f.verba)}, foram realizados os seguintes ajustes:\n\n`;
    itensComCorte.forEach(a=>{
      const corte = num(a.vo)-num(a.va);
      textoCliente += `• ${a.item}${a.obs?' — '+a.obs:''}${corte>0?' (−'+fmt(corte)+')':''}\n`;
    });
    textoCliente += `\nEssas alterações reduzem o investimento total de ${fmt(k.totalCalc)} para ${fmt(f.verba)}.`;
  }

  document.getElementById('v-ajuste').innerHTML=`
  <div class="panel">
    <div class="panel-title">Ajuste de Escopo</div>

    ${!f.verba || f.verba<=0 ? `
      <div style="padding:28px 18px;text-align:center;color:var(--txt-dim);line-height:1.7">
        <div style="font-size:24px;margin-bottom:8px;opacity:.4">○</div>
        <div style="font-size:13px;color:var(--txt)">Defina a Meta de Faturamento na aba Dados para usar o ajuste de escopo.</div>
      </div>
    ` : `

    <!-- CARDS PRINCIPAIS (ponto 1) -->
    <div class="kpi-grid" style="margin-bottom:18px">
      <div class="kpi"><div class="k-label">Total Ideal</div><div class="k-val">${fmt(k.totalCalc)}</div></div>
      <div class="kpi"><div class="k-label">Meta Aprovada</div><div class="k-val" style="color:var(--blue-in)">${fmt(f.verba)}</div></div>
      ${modoCorte?`
        <div class="kpi"><div class="k-label">Corte Necessário</div><div class="k-val v-yellow">${fmt(metaCorte)}</div></div>
        <div class="kpi"><div class="k-label">Redução Necessária</div><div class="k-val v-yellow">${fmt(gap)}</div></div>
      </div>
      <div class="kpi-grid" style="margin-bottom:18px">
        <div class="kpi"><div class="k-label">Cortes Realizados</div><div class="k-val ${cortadoProd>0.5?'v-yellow':''}">${cortadoProd>0.5?fmt(cortadoProd):"Nenhum"}</div></div>
        <div class="kpi" style="border-color:${fechou?'#2a5c34':'var(--line)'}"><div class="k-label">Novo Total Projetado</div><div class="k-val ${fechou?'v-green':''}">${cortadoProd>0.5?fmt(k.totalCalc - cortadoProd*(1+k.t+k.i)):fmt(k.totalCalc)}</div>${cortadoProd<0.5?'<div style="font-size:9px;color:var(--txt-dim);margin-top:2px">(sem ajustes)</div>':''}</div>
      `:`
        <div class="kpi"><div class="k-label">Situação</div><div class="k-val v-green">${modoSubida?'Folga de '+fmt(gap):'No alvo'}</div></div>
      `}
    </div>

    ${modoCorte ? `
    <!-- EXPLICAÇÃO DA CASCATA (pontos 2 e 3) -->
    <div style="background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:18px;font-size:12px;line-height:1.8">
      <div style="font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;font-weight:600">Impacto Automático dos Cortes</div>
      <div style="color:var(--txt-dim);margin-bottom:14px">Para atingir a Meta de <b style="color:var(--txt)">${fmt(f.verba)}</b>:</div>
      <div style="display:flex;flex-direction:column;gap:2px;font-size:12px">
        <div style="display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.02);border-radius:6px"><span style="font-weight:600">Corte em Produção</span><span style="font-weight:600">${fmt(metaCorte)}</span></div>
        <div style="text-align:center;font-size:10px;color:var(--txt-dim)">↓</div>
        <div style="display:flex;justify-content:space-between;padding:6px 12px;color:var(--txt-dim)"><span>Fee reduzido automaticamente</span><span>${fmt(feeReduz)}</span></div>
        <div style="text-align:center;font-size:10px;color:var(--txt-dim)">↓</div>
        <div style="display:flex;justify-content:space-between;padding:6px 12px;color:var(--txt-dim)"><span>Impostos reduzidos automaticamente</span><span>${fmt(impReduz)}</span></div>
        <div style="text-align:center;font-size:10px;color:var(--txt-dim)">↓</div>
        <div style="display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.02);border-radius:6px;font-weight:700;border-top:1px solid var(--line)"><span>Redução Total no Orçamento</span><span>${fmt(impactoTotal)}</span></div>
      </div>
    </div>
    ` : modoSubida ? `
    <div style="padding:14px 16px;margin-bottom:18px;background:#edf7f0;border:1px solid #90c0a0;border-radius:10px;font-size:12px;color:#2d6a3e;line-height:1.6">
      💰 A Meta (${fmt(f.verba)}) é maior que o total ideal. Você pode subir valores na aba Dados usando o botão "Ajustar valores até a meta".
    </div>
    ` : `
    <div style="padding:14px 16px;margin-bottom:18px;background:#edf7f0;border:1px solid #90c0a0;border-radius:10px;font-size:12px;color:#2d6a3e;line-height:1.6">
      ✓ O total a cobrar bateu com a Meta. Sem ajustes necessários.
    </div>
    `}

    <!-- TABELA DE AJUSTES (ponto 4) -->
    ${modoCorte ? `
    <div style="margin-bottom:6px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--txt-dim)">Itens ajustados</div>
    <table class="aj-table">
      <tr><th>Categoria</th><th>Item</th><th>Justificativa</th><th style="text-align:right">Valor Original</th><th style="text-align:right">Novo Valor</th><th style="text-align:right">Corte</th><th style="text-align:right">Impacto Final</th><th></th></tr>
      ${rows || '<tr><td colspan="8" style="text-align:center;padding:18px;color:var(--txt-dim);font-size:12px">Nenhum corte lançado ainda.</td></tr>'}
    </table>
    <button class="add-item" onclick="addAj()">+ Adicionar linha de ajuste</button>

    <!-- STATUS DE FECHAMENTO (ponto 5) -->
    ${(()=>{
      const excedente = cortadoProd - metaCorte;
      if(cortadoProd < 0.5) return `<div class="status yellow" style="margin-top:16px;padding:14px"><div class="s-text" style="font-size:14px">Faltam <b>${fmt(metaCorte)}</b> em cortes de produção para atingir a Meta de ${fmt(f.verba)}.</div></div>`;
      if(excedente > metaCorte*0.02) return `<div class="status yellow" style="margin-top:16px;padding:14px"><div class="s-text" style="font-size:14px">⚠ Corte acima do necessário — excedente de <b>${fmt(excedente)}</b> em produção. O total projetado ficará abaixo da Meta.</div></div>`;
      if(fechou) return `<div class="status green" style="margin-top:16px;padding:14px"><div class="s-text" style="font-size:14px">✅ Meta atingida — Novo total projetado alinhado à Meta aprovada de ${fmt(f.verba)}</div></div>`;
      return `<div class="status yellow" style="margin-top:16px;padding:14px"><div class="s-text" style="font-size:14px">⚠ Faltam <b>${fmt(falta)}</b> em cortes de produção para atingir a Meta de ${fmt(f.verba)}</div></div>`;
    })()}

    <!-- RESUMO ANTES × DEPOIS (ponto 7) -->
    ${cortadoProd>0.5 ? `
    <div style="margin-top:20px;padding:16px 18px;background:#ffffff;border:1px solid var(--line);border:1px solid var(--line);border-radius:10px;font-size:12px;line-height:2">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);margin-bottom:8px">Resumo do ajuste</div>
      <div style="display:flex;justify-content:space-between"><span>Total Ideal (antes)</span><span>${fmt(k.totalCalc)}</span></div>
      <div style="display:flex;justify-content:space-between"><span>Corte em Produção</span><span class="v-yellow">${fmt(cortadoProd)}</span></div>
      <div style="display:flex;justify-content:space-between;color:var(--txt-dim)"><span>↳ Fee reduzido</span><span>−${fmt(cortadoProd*k.t)}</span></div>
      <div style="display:flex;justify-content:space-between;color:var(--txt-dim)"><span>↳ Imposto reduzido</span><span>−${fmt(cortadoProd*k.i)}</span></div>
      <div style="display:flex;justify-content:space-between;border-top:1px solid var(--line);margin-top:6px;padding-top:6px;font-weight:700"><span>Total Ajustado (depois)</span><span ${fechou?'class="v-green"':''}>${fmt(k.totalCalc - cortadoProd*(1+k.t+k.i))}</span></div>
      <div style="display:flex;justify-content:space-between"><span>Meta Aprovada</span><span>${fmt(f.verba)}</span></div>
      <div style="display:flex;justify-content:space-between;font-weight:600"><span>Status</span><span ${fechou?'class="v-green"':'class="v-yellow"'}>${fechou?'✅ FECHADO':'⚠ Falta '+fmt(falta)}</span></div>
    </div>
    `:''}

    <!-- TEXTO COMERCIAL (ponto 6) -->
    ${textoCliente ? `
    <div style="margin-top:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim)">Texto para o cliente</div>
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:10px" onclick="navigator.clipboard.writeText(document.getElementById('textoCliente').textContent).then(()=>this.textContent='✓ Copiado')">Copiar</button>
      </div>
      <div id="textoCliente" style="padding:14px 16px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;font-size:12px;line-height:1.8;white-space:pre-wrap;color:var(--txt-dim)">${esc(textoCliente)}</div>
    </div>
    `:''}
    `:''}
  `}
  </div>`;
}

function copyText(){
  const t=document.getElementById('clientText').innerText;
  navigator.clipboard.writeText(t).then(()=>{
    event.target.textContent='✓ Copiado';
    setTimeout(()=>event.target.textContent='Copiar texto',1500);
  });
}


/* ============ RENDER: HISTÓRICO ============ */
function renderHistorico(){

  const rows = list.map((p,idx)=>{
    const isAtual = (histAbertoId && p.id===histAbertoId);
    const versao = p.versaoNome ? p.versaoNome : ('v'+(list.length-idx));
    const dataTxt = p.data || '—';
    return `
    <tr style="${isAtual?'background:rgba(201,162,39,.06);':''}">
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="font-weight:600;color:var(--txt)">${esc(p.nome)}</div>
          ${isAtual?'<span style="font-size:9px;background:var(--gold);color:#0d0d0d;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:.04em">ATUAL</span>':''}
        </div>
        <div style="font-size:10px;color:var(--txt-dim);margin-top:2px">
          <span style="color:var(--gold)">${esc(versao)}</span> · ${dataTxt}
          ${p.cliente?' · '+esc(p.cliente):''}
          ${p.responsavel?' · por '+esc(p.responsavel):''}
        </div>
      </td>
      <td style="text-align:right">${fmt(p.total)}</td>
      <td style="text-align:right">${p.verba>0?fmt(p.verba):'—'}</td>
      <td style="text-align:right">${fmt(p.lucro)}</td>
      <td style="text-align:center"><span style="display:inline-flex;align-items:center;gap:6px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${dotColor(p.status)}"></span><span style="font-size:10px;color:var(--txt-dim)">${statusTxt(p.status)}</span></span></td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn btn-ghost" style="padding:4px 8px;font-size:10px" onclick="abrirDoHistorico('${p.id}')">Abrir</button>
        <button class="btn btn-ghost" style="padding:4px 8px;font-size:10px;color:#a05050" onclick="apagarDoHistorico('${p.id}')">✕</button>
      </td>
    </tr>`;}).join('');

  // Última sincronização
  const lastSync = lastCloudError ? `⚠ Último erro: ${lastCloudError}` : (cloudOn()&&sb ? '✓ Conectado à nuvem' : 'Salvando localmente');

  document.getElementById('v-historico').innerHTML=`
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap">

      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="salvarNoHistorico()" style="background:var(--gold);color:#0d0d0d;border:none;padding:8px 16px;border-radius:8px;font-weight:600;font-size:11px;cursor:pointer">💾 Salvar orçamento atual</button>
        <button class="btn btn-ghost" style="padding:8px 12px;font-size:11px" onclick="novoOrcamento()">+ Novo Orçamento</button>
      </div>
    </div>

    <div style="font-size:10px;color:var(--txt-dim);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
      <span>${list.length} ${list.length===1?'versão salva':'versões salvas'}</span>
      <span id="saveHint" style="color:var(--gold)">${lastSync}</span>
    </div>

    ${list.length>0 ? `
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <tr style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--txt-dim)">
          <th style="text-align:left;padding:8px 4px">Projeto</th>
          <th style="text-align:right;padding:8px 4px">Total</th>
          <th style="text-align:right;padding:8px 4px">Meta</th>

      <div style="padding:28px 18px;text-align:center;color:var(--txt-dim);line-height:1.7">
        <div style="font-size:24px;margin-bottom:8px;opacity:.4">○</div>
