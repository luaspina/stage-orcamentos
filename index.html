function upd(cat,idx,field,val){
  const it=S.items[cat][idx];
  it[field] = (field==='q'||field==='cc'||field==='cs') ? num(val) : val;
  // trava: Destino Stage/Incluso força Custo Stage = 0
  if(field==='cs' && (it.dest==='Stage'||it.dest==='Incluso')) it.cs = 0;
  // se mudou o Custo Cliente e o destino copia (Freela/Fornecedor/Locação/Reembolso), mantém cs sincronizado só se ainda não foi editado manualmente

  if(field==='vi') it.v = it.vi; // Valor Ideal é o que soma: mantém v sincronizado
  save();
  // live-update the row total + category total + tab dot, without re-rendering (keeps input focus)
  liveUpdateDados();
}
function liveUpdateDados(){
  // total da categoria (Total Cliente)
  cats().forEach((c)=>{
    const el=document.querySelector(`#tot-${c.id}`);
    const t=catCliente(c.id);
    if(el){el.textContent=fmt(t);el.className='cat-total '+(t?'':'zero');}
  });
  // por linha: Total Cliente, Total Stage, Margem
  cats().forEach((c)=>{
    (S.items[c.id]||[]).forEach((it,idx)=>{
      const totC=(it.q||0)*(it.cc||0), totS=(it.q||0)*(it.cs||0), marg=totC-totS;
      const elC=document.querySelector(`#rowtotc-${c.id}-${idx}`); if(elC)elC.textContent=fmt(totC);
      const elS=document.querySelector(`#rowtots-${c.id}-${idx}`); if(elS)elS.textContent=fmt(totS);
      const elM=document.querySelector(`#rowmarg-${c.id}-${idx}`);
      if(elM){ elM.textContent=fmt(marg); elM.style.color = marg>0?'var(--green)':marg<0?'var(--red)':'#888'; }
    });
  });
  refreshResultPanel();
  renderTabs();
}
function refreshResultPanel(){
  const el=document.getElementById('resultPanel');
  if(el)el.innerHTML=resultPanelHTML();
}
// ── Fechar o total num valor redondo, calculando o desconto% necessário ──
function fecharEmValor(val){
  const alvo = num(val);
  const sub = subtotal();
  if(sub<=0) return;
  if(alvo<=0){ // limpar desconto e alvo
    S.fiscal.desconto = 0; S.fiscal.fecharEm = 0; save(); renderDados(); return;
  }
  const t=S.fiscal.taxa/100, i=S.fiscal.imposto/100;
  // total = sub*(1+t+i-d) = alvo  =>  d = (1+t+i) - alvo/sub
  const d = (1+t+i) - (alvo/sub);
  const descPct = d*100;
  if(descPct < 0){
    alert("Para chegar em "+fmt(alvo)+" seria preciso AUMENTAR o preço (desconto negativo). Use o botão 'Ajustar valores até a meta' para isso, ou ajuste os itens.");
    return;
  }
  S.fiscal.desconto = Math.round(descPct*100)/100; // % para exibição/cálculo do painel
  S.fiscal.fecharEm = alvo;                         // alvo exato para a Folha de Rosto
  save();
  renderDados();
}

// ── Simulação: ajustar Valor Cobrado até bater na verba (mantém Pago fixo) ──
let simAjuste = null; // {fator, novoSub, novoTotal, novoLucro, novoExtra} ou null

function simularAjusteVerba(){
  const k=calc();
  if(!(S.fiscal.verba>0)){ alert("Defina a Meta de Faturamento primeiro."); return; }
  // Receita desejada para o total bater na verba: verba/(1+t+i-d)
  const receitaDesejada = S.fiscal.verba/(1+k.t+k.i-k.d);
  const fator = k.receitaCliente>0 ? receitaDesejada/k.receitaCliente : 1;
  // Trava de segurança: só sobe. Se precisar baixar, recomenda cortar escopo.
  if(fator < 1){ return; }
  const novaReceita = receitaDesejada;
  const novoTotal = novaReceita*(1+k.t+k.i-k.d);
  // Custo Real (Stage) fica fixo; o Resultado Operacional sobe
  const novoResultadoOper = novaReceita - k.custoReal;
  const novoLucro = novoResultadoOper + novaReceita*k.t - novaReceita*k.d;
  simAjuste = {fator, novaReceita, novoTotal, novoLucro, novoResultadoOper, totalAntigo:k.totalCalc, lucroAntigo:k.lucroLiquido};
  refreshResultPanel();
}

function aplicarAjusteVerba(){
  if(!simAjuste) return;
  const f = simAjuste.fator;
  cats().forEach(c=>{
    (S.items[c.id]||[]).forEach(it=>{
      it.cc = Math.round((it.cc||0)*f*100)/100; // sobe o Custo Cliente
      // Custo Stage (cs) permanece intacto
    });
  });
  simAjuste = null;
  save();
  renderDados();
}

function cancelarAjusteVerba(){ simAjuste=null; refreshResultPanel(); }

function updFiscal(field,val){
  S.fiscal[field]=num(val);
  if(field==='desconto') S.fiscal.fecharEm = 0; // desconto manual cancela o alvo redondo
  save();
  refreshResultPanel();
  renderTabs();
}
function updDest(cat,idx,val){
  const it=S.items[cat][idx];
  it.dest=val;
  // aplica a regra automática do destino (ajusta cc/cs)
  switch(val){
    case "Stage":      it.cs = 0; break;
    case "Freela":     it.cs = it.cc; break;
    case "Fornecedor": it.cs = it.cc; break;
    case "Locação":    it.cs = it.cc; break;
    case "Catering":   it.cs = it.cc; break;
    case "Cortesia":   it.cc = 0; break;
    case "Incluso":    it.cc = 0; it.cs = 0; break;
    case "Reembolso":  it.cs = it.cc; break;
  }
  save();
  renderDados(); // re-render para refletir cc/cs ajustados
}
function toggleCat(id){S.openCats[id]=!S.openCats[id];save();renderDados();}
function toggleIdeal(){S.showIdeal=!S.showIdeal;save();renderDados();}
function togglePago(){S.showPago=!S.showPago;save();renderDados();}
function toggleEmpty(){S.hideEmpty=!S.hideEmpty;save();renderDados();}
function addItem(cat){if(!S.items[cat])S.items[cat]=[];S.items[cat].push({d:"",q:1,cc:0,cs:0,dest:"Freela",i:""});S.openCats[cat]=true;save();renderDados();}
function delItem(cat,idx){S.items[cat].splice(idx,1);save();renderDados();}
function updAj(idx,field,val){S.ajustes[idx][field]=(['vo','va'].includes(field))?num(val):val;save();renderAjuste();}
function addAj(){S.ajustes.push({cat:"",item:"",vo:0,va:0,obs:""});save();renderAjuste();}
function delAj(idx){S.ajustes.splice(idx,1);save();renderAjuste();}

document.getElementById('projName').addEventListener('input',e=>{S.projName=e.target.value;save();});

go('inicio');
fetchHist(); // carrega histórico compartilhado em segundo plano
